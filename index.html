<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Kingdom Reforged — Card Editor</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Architects+Daughter&family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4efe4;--paper-2:#ece4d2;--paper-3:#e3d9c2;
  --ink:#1b1a17;--ink-soft:#4a463d;--ink-ghost:#756e5d;
  --accent:#c2410c;--accent-2:#0f766e;--accent-3:#a16207;
  --danger:#b91c1c;--line:#2a2722;--wood:#d7b27a;--wood-2:#c69a5c;
  --focus-bg:#fff8e6;
  --grain:rgba(20,20,0,.035);
  --overlay:rgba(27,26,23,.55);
  --card-center-ring:rgba(255,255,255,.9);
  --s-1:4px;--s-2:8px;--s-3:12px;--s-4:16px;--s-5:24px;--s-6:32px;
  --shadow-sm:2px 2px 0 var(--line);
  --shadow-md:4px 4px 0 rgba(0,0,0,.12);
  --shadow-lg:6px 6px 0 var(--line);
  --shadow-soft:0 2px 6px rgba(0,0,0,.08);
  --t-fast:120ms;--t-med:220ms;--t-slow:380ms;
  --ease:cubic-bezier(.4,0,.2,1);
  --header-h:100px;
}
:root[data-theme="dark"]{
  --paper:#1c1a16;--paper-2:#26231d;--paper-3:#322d25;
  --ink:#ece4d2;--ink-soft:#b8afa0;--ink-ghost:#8a8270;
  --accent:#e2753a;--accent-2:#2dd4bf;--accent-3:#d4a54a;
  --danger:#ef4444;--line:#d6ccb8;--wood:#5a4429;--wood-2:#6e5534;
  --focus-bg:#2a251d;
  --grain:rgba(255,255,255,.04);
  --overlay:rgba(0,0,0,.7);
  --shadow-md:4px 4px 0 rgba(0,0,0,.35);
  --shadow-soft:0 2px 8px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:'Patrick Hand',sans-serif;font-size:16px;line-height:1.4;min-height:100vh}
body{background-image:radial-gradient(circle at 20% 10%,var(--grain),transparent 40%),radial-gradient(circle at 80% 80%,var(--grain),transparent 40%),repeating-linear-gradient(0deg,transparent 0 27px,var(--grain) 27px 28px);overflow-x:hidden}
h1,h2,h3,h4{font-family:'Kalam',cursive;font-weight:700}

/* ── HEADER ── */
.chrome{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:2px dashed var(--line);padding:12px 20px}
.chrome-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:40px;height:40px;border:2px solid var(--line);border-radius:10px;display:grid;place-items:center;background:var(--paper-2);transform:rotate(-6deg);font-family:'Kalam';font-weight:700;font-size:20px;box-shadow:3px 3px 0 var(--line)}
.brand h1{font-size:22px}
.brand .sub{font-family:'Caveat';color:var(--ink-soft);font-size:16px}
.chrome-actions{margin-left:auto;display:flex;gap:6px;align-items:center}

/* ── BUTTONS ── */
.btn{font-family:'Kalam';font-weight:700;font-size:13px;border:2px solid var(--line);background:var(--paper);padding:5px 12px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;box-shadow:2px 2px 0 var(--line);white-space:nowrap;color:var(--ink)}
.btn:hover{background:var(--paper-2)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:#a83509}
.btn.teal{background:var(--accent-2);color:#fff;border-color:var(--accent-2)}
.btn.ghost{background:transparent;box-shadow:none;border-style:dashed}
.btn.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn.danger:hover{background:#991b1b}
.btn:disabled{opacity:.45;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;gap:4px;font-family:'Kalam';font-size:12px;font-weight:700;border:1.5px solid var(--line);padding:3px 10px;border-radius:14px;background:var(--paper);cursor:pointer;color:var(--ink)}
.chip.on{background:var(--ink);color:var(--paper)}
.chip:hover:not(.on){background:var(--paper-2)}
.chip .c{opacity:.7;font-family:'Caveat';margin-left:2px}

/* ── RESOURCE TOKENS ── */
.res{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);font-family:'Kalam';font-weight:700;font-size:10px;flex-shrink:0}
.res.wood{background:#e2c391;color:#5a3a12}.res.stone{background:#d4d1ca;color:#3a3a3a}
.res.wheat{background:#f1d983;color:#6b4a0a}.res.iron{background:#e7c547;color:#5a4108}
.res.water{background:#9ec9e6;color:#0a3856}
.res.lg{width:28px;height:28px;font-size:12px}
.res.sm{width:18px;height:18px;font-size:9px}

/* ── CARD ── */
.kcard{
  width:var(--sz,220px);height:var(--sz,220px);position:relative;
  border:3px solid var(--line);border-radius:14px;
  background:repeating-linear-gradient(90deg,var(--wood) 0 3px,var(--wood-2) 3px 8px,var(--wood) 8px 14px);
  box-shadow:4px 4px 0 rgba(0,0,0,.12);overflow:hidden;
  transition:transform .45s cubic-bezier(.65,0,.35,1);flex-shrink:0;
}
.kcard.sm{--sz:160px}.kcard.xs{--sz:110px}.kcard.md{--sz:220px}.kcard.lg{--sz:320px}.kcard.xl{--sz:400px}
.kcard.exploration{background:repeating-linear-gradient(0deg,#cfdab6 0 4px,#bccca0 4px 10px)}
.kcard.treasure{background:repeating-linear-gradient(45deg,#e6cf91 0 5px,#d9bc75 5px 12px)}
.kcard.action{background:repeating-linear-gradient(90deg,#cbbce0 0 4px,#b9a5d4 4px 10px)}
/* corner stage number */
.corner{position:absolute;width:26px;height:26px;border:2px solid var(--line);border-radius:50%;background:var(--paper);display:grid;place-items:center;font-family:'Kalam';font-weight:700;font-size:12px;z-index:3;color:var(--ink)}
.corner.top{top:5px;left:50%;transform:translateX(-50%)}
.corner.right{right:5px;top:50%;transform:translateY(-50%) rotate(90deg)}
.corner.bottom{bottom:5px;left:50%;transform:translateX(-50%) rotate(180deg)}
.corner.left{left:5px;top:50%;transform:translateY(-50%) rotate(-90deg)}
/* heraldic shield corner: stage number visible inside */
.corner.shielded{
  background:linear-gradient(155deg,#f3d77b 0%,#dca83d 45%,#9e6e17 100%);
  color:#3a1e04;
  border:none;
  clip-path:polygon(0 0,100% 0,100% 55%,86% 82%,50% 100%,14% 82%,0 55%);
  border-radius:3px 3px 0 0;
  width:26px;height:30px;font-size:12px;
  align-items:center;padding:0;
  text-shadow:0 1px 0 rgba(255,255,255,.35);
  box-shadow:inset 0 0 0 2px #5e3f0f,inset 0 -4px 6px rgba(0,0,0,.2),inset 0 3px 4px rgba(255,255,255,.22);
}
.corner.editable{cursor:pointer}
/* diagonal cost ribbon — edge-to-edge across each corner (clipped by .kcard overflow:hidden).
   For symmetric placement, offsets satisfy: perpendicular_offset + parallel_offset = (W-H)/2 / S.
   With W=60% H≈11% → offsets: ~10.5% inner (top/bottom) + 14% outward (right/left). */
.ribbon{position:absolute;width:60%;height:24px;background:repeating-linear-gradient(90deg,#f0e7d4 0 6px,#e4d7ba 6px 12px);border-top:1.5px solid var(--line);border-bottom:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;gap:3px;font-family:'Kalam';font-size:10px;font-weight:700;z-index:2;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08);transform-origin:center}
.ribbon.tr{top:10.5%;right:-14%;transform:rotate(45deg)}
.ribbon.br{bottom:10.5%;right:-14%;transform:rotate(-45deg)}
.ribbon.bl{bottom:10.5%;left:-14%;transform:rotate(45deg)}
.ribbon.tl{top:10.5%;left:-14%;transform:rotate(-45deg)}
.ribbon.editable{cursor:pointer}.ribbon.editable:hover{background:repeating-linear-gradient(90deg,#fff5d6 0 6px,#f5e5ab 6px 12px)}
/* bonus slot — anchored via center so content width doesn't shift placement.
   Centers sit 20% from each edge, aligned with the stage marker on that edge. */
.bonus{position:absolute;background:var(--paper);border:1.5px solid var(--line);border-radius:7px;padding:3px 7px;font-family:'Kalam';font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px;z-index:4;white-space:nowrap;color:var(--ink);box-shadow:1px 1px 0 rgba(0,0,0,.08)}
.bonus.top{top:20%;left:50%;transform:translate(-50%,-50%)}
.bonus.right{right:20%;top:50%;transform:translate(50%,-50%) rotate(90deg);max-width:calc(var(--sz,220px) * .34);overflow:hidden}
.bonus.bottom{bottom:20%;left:50%;transform:translate(-50%,50%) rotate(180deg)}
.bonus.left{left:20%;top:50%;transform:translate(-50%,-50%) rotate(-90deg);max-width:calc(var(--sz,220px) * .34);overflow:hidden}
.bonus.editable{cursor:pointer}.bonus.editable:hover{background:var(--focus-bg)}
/* bonus icons */
.bpv{display:inline-flex;align-items:center;gap:1px;font-family:'Kalam';font-weight:700}
.bpv::before{content:'★';color:#c2410c}
.bworker::before{content:'👷';font-size:10px}
.baction::before{content:'⚡';font-size:10px}
.bdraw::before{content:'📜';font-size:10px}
.bchain{color:var(--accent-2)}
.bprod{opacity:.8}
.bprod-badge::after{content:'⟳';font-size:9px;opacity:.7}
/* bonus structured editor (reused in cell modal) */
.bonus-editor{display:flex;flex-direction:column;gap:6px}
.be-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.be-label{font-family:'Kalam';font-size:11px;color:var(--ink-soft);min-width:80px;text-transform:uppercase;letter-spacing:.3px}
.be-stepper{display:inline-flex;align-items:center;gap:4px;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:2px 6px}
.be-stepper span{font-family:'Kalam';font-weight:700;font-size:13px;min-width:16px;text-align:center;color:var(--ink)}
.be-stepper button{width:20px;height:20px;border:none;background:none;cursor:pointer;font-family:'Kalam';font-weight:700;font-size:14px;line-height:1;color:var(--ink-soft)}
.be-stepper button:hover{color:var(--ink)}
.be-select{font-family:'Kalam';font-size:12px;border:1.5px solid var(--line);border-radius:6px;background:var(--paper);padding:3px 6px;cursor:pointer;color:var(--ink)}
.be-note{font-family:'Patrick Hand';font-size:14px;border:1.5px dashed var(--line);border-radius:6px;background:var(--paper);padding:4px 8px;width:100%;outline:none;color:var(--ink)}
.be-note:focus{border-style:solid;background:var(--focus-bg)}
/* center illustration — shrunk so side bonus labels sit clearly outside */
.kcenter{position:absolute;inset:32%;border:2.5px solid var(--line);border-radius:50%;background:radial-gradient(circle,#a8c35a,#6b8b2e);display:grid;place-items:center;color:#fff;font-family:'Kalam';font-weight:700;font-size:12px;text-align:center;z-index:2;overflow:hidden}
.kcard.exploration .kcenter{background:radial-gradient(circle,#e9c57a,#b88437)}
.kcard.treasure .kcenter{background:radial-gradient(circle,#f4d871,#b8892a)}
.kcard.action .kcenter{background:radial-gradient(circle,#c4a7e0,#7b5db0)}
.kcenter img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.kcenter.editable{cursor:pointer}.kcenter.editable:hover{box-shadow:0 0 0 3px var(--accent)}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:12px;padding:12px 20px;border-bottom:2px dashed var(--line);flex-wrap:wrap;align-items:center;background:var(--paper)}
.tb-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tb-sep{width:1.5px;align-self:stretch;background:var(--line);opacity:.35;margin:2px 4px}
.search{display:flex;align-items:center;gap:6px;border:2px solid var(--line);border-radius:20px;padding:4px 12px;background:var(--paper-2);min-width:180px;max-width:260px}
.search input{border:none;outline:none;background:transparent;flex:1;font-family:'Patrick Hand';font-size:15px;color:var(--ink);min-width:80px}
.chip-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sort-ctrl{display:inline-flex;align-items:center;gap:6px;border:2px solid var(--line);border-radius:10px;background:var(--paper);padding:2px 10px;box-shadow:var(--shadow-sm);font-family:'Kalam';font-weight:700;font-size:13px;color:var(--ink-soft)}
.sort-ctrl .sort-ico{font-size:15px;color:var(--ink)}
.sort-ctrl select{border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;padding:4px 2px;outline:none}
.view-toggle{display:inline-flex;border:2px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);margin-left:auto}
.vt-btn{border:none;background:var(--paper);padding:6px 14px;cursor:pointer;font-family:'Kalam';font-weight:700;font-size:13px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:4px}
.vt-btn.on{background:var(--ink);color:var(--paper)}
.vt-btn:not(.on):hover{background:var(--paper-2)}

/* ── MAIN ── */
main{min-height:50vh}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;color:var(--ink-ghost);font-family:'Caveat';font-size:18px;text-align:center}
.empty-state .icon{font-size:48px}

/* ── LIST MODE ── */
.cards-list{display:flex;flex-direction:column;gap:10px;padding:16px;max-width:1500px;margin:0 auto}
.card-row{display:grid;grid-template-columns:220px 200px repeat(4, minmax(110px, 1fr));gap:10px;padding:10px;border:2px solid var(--line);border-radius:14px;background:var(--paper-2);box-shadow:var(--shadow-md);align-items:stretch}
.row-actions{display:flex;gap:4px;margin-top:4px;padding-top:4px;border-top:1px dashed var(--line);justify-content:space-between}
.row-actions .btn-row-act{flex:1;padding:3px 6px;font-size:11px;box-shadow:none;border:1.5px solid var(--line);background:var(--paper);border-radius:6px;font-family:'Kalam';font-weight:700;color:var(--ink);cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;gap:3px;transition:background var(--t-fast) var(--ease)}
.row-actions .btn-row-act:hover{background:var(--paper-2)}
.row-actions .btn-row-act.danger{color:var(--danger);border-color:var(--danger)}
.row-actions .btn-row-act.danger:hover{background:var(--danger);color:#fff}
.row-preview{display:flex;justify-content:center;align-items:center;min-width:0}
.row-info{display:flex;flex-direction:column;gap:3px;min-width:0;justify-content:center}
/* Inline editors for row-info (name/type/image/copies) */
.info-inline{display:flex;align-items:center;gap:8px;padding:3px 6px;border:1.5px dashed transparent;border-radius:8px;transition:border-color var(--t-fast) var(--ease)}
.info-inline:hover{border-color:var(--line)}
.info-inline .label{font-family:'Kalam';font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);min-width:44px;font-weight:700;flex-shrink:0}
.inline-input{flex:1;min-width:0;font-family:'Patrick Hand';font-size:14px;color:var(--ink);padding:3px 6px;background:transparent;border:1.5px dashed transparent;border-radius:6px;outline:none}
.inline-input:hover{border-color:var(--line);background:var(--paper-3)}
.inline-input:focus{border-style:solid;border-color:var(--accent);background:var(--focus-bg)}
.inline-select{border:1.5px solid var(--line);border-radius:6px;background:var(--paper);padding:3px 6px;font-family:'Patrick Hand';font-size:13px;color:var(--ink);cursor:pointer;outline:none}
.inline-select:focus{border-color:var(--accent);background:var(--focus-bg)}
.inline-stepper{display:inline-flex;align-items:center;gap:4px}
.inline-stepper b{font-family:'Kalam';font-weight:700;font-size:14px;min-width:16px;text-align:center;color:var(--ink)}
.btn-mini{width:22px;height:22px;border:1.5px solid var(--line);border-radius:50%;background:var(--paper);cursor:pointer;font-family:'Kalam';font-weight:700;font-size:12px;color:var(--ink);display:grid;place-items:center;padding:0;line-height:1;transition:background var(--t-fast) var(--ease)}
.btn-mini:hover:not(:disabled){background:var(--paper-2)}
.btn-mini:disabled{opacity:.35;cursor:not-allowed}
.inline-imgzone{flex:1;min-height:32px;border:1.5px dashed var(--line);border-radius:6px;padding:3px 6px;position:relative;display:flex;align-items:center;gap:6px;cursor:pointer;font-family:'Caveat';color:var(--ink-ghost);font-size:12px;transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease);overflow:hidden}
.inline-imgzone:hover{background:var(--focus-bg);border-color:var(--line)}
.inline-imgzone.dragover{background:var(--focus-bg);border-color:var(--accent);border-style:solid}
.inline-imgzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.inline-img-thumb{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid var(--line);flex-shrink:0}
.inline-img-label{flex:1;color:var(--ink-soft);font-size:11px}
.inline-img-ghost{flex:1;text-align:center}
.img-clear{margin-left:auto;color:var(--danger);border-color:var(--danger);z-index:2;position:relative}
/* Stage columns (6-col list layout) */
.stage-col{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 4px;border:1.5px dashed var(--line);border-radius:10px;background:var(--paper);min-height:100%;min-width:0;position:relative}
.stage-col.empty{border-style:dashed;background:repeating-linear-gradient(45deg,transparent 0 8px,rgba(0,0,0,.03) 8px 9px);cursor:pointer;opacity:.45;transition:opacity var(--t-fast) var(--ease),background var(--t-fast) var(--ease)}
.stage-col.empty:hover{opacity:1;background:var(--focus-bg)}
.stage-col.empty.disabled{cursor:default;opacity:.22}
.stage-col.empty.disabled:hover{opacity:.22;background:repeating-linear-gradient(45deg,transparent 0 8px,rgba(0,0,0,.03) 8px 9px)}
.stage-col .add-stage-ico{font-family:'Kalam';font-weight:700;font-size:32px;color:var(--ink-soft);line-height:1;margin:auto;user-select:none}
.stage-col .stage-num{width:44px;height:44px;font-size:18px}
.stage-col .stage-num.shielded{width:40px;height:52px;font-size:18px}
.stage-col .stage-cell{width:100%;justify-content:center;text-align:center;min-height:28px;flex-wrap:wrap;padding:4px 6px}
.stage-del{position:absolute;top:2px;right:2px;width:18px;height:18px;border:1.5px solid var(--line);border-radius:50%;background:var(--paper);color:var(--danger);font-family:'Kalam';font-weight:700;font-size:11px;cursor:pointer;display:grid;place-items:center;line-height:1;padding:0;opacity:0;transition:opacity var(--t-fast) var(--ease),background var(--t-fast) var(--ease);z-index:3}
.stage-col:hover .stage-del,.stage-col:focus-within .stage-del{opacity:1}
.stage-del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}

/* Styled cost/bonus encarts — blueprint for cost, parchment for bonus */
.stage-box{width:100%;border-radius:8px;padding:4px 6px 6px;position:relative;cursor:pointer;transition:transform var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease)}
.stage-box:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
.stage-box-label{font-family:'Kalam';font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.5px;text-align:center;line-height:1;margin-bottom:3px;opacity:.75}
.stage-box-content{min-height:22px;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:3px;font-family:'Kalam';font-size:12px}
.stage-box-content.empty{color:var(--ink-ghost);font-family:'Caveat';font-style:italic;font-size:13px;opacity:.55}
/* Blueprint — plan de construction */
.stage-box.cost{
  background:#dce9f3;
  background-image:
    linear-gradient(to right, rgba(35,80,120,.18) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(35,80,120,.18) 1px, transparent 1px);
  background-size:6px 6px;
  border:1.5px solid #4a7ba0;
  color:#1a3a55;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.35);
}
.stage-box.cost .stage-box-label{color:#1a3a55}
.stage-box.cost.empty-slot{opacity:.45;background:repeating-linear-gradient(45deg,#dce9f3 0 6px,#c8d8e6 6px 7px)}
/* Parchment — bonus */
.stage-box.bonus-box{
  background:linear-gradient(135deg,#f6e8c3 0%,#ecd7a0 55%,#dcbf7a 100%);
  border:1.5px solid #8b6a2f;
  color:#3a2608;
  box-shadow:inset 0 1px 2px rgba(255,255,255,.4),inset 0 -2px 4px rgba(120,80,20,.15);
  position:relative;
}
.stage-box.bonus-box::before{
  content:'';position:absolute;inset:0;border-radius:7px;pointer-events:none;
  background:
    radial-gradient(circle at 15% 20%, rgba(100,60,0,.08) 0 12%, transparent 25%),
    radial-gradient(circle at 85% 80%, rgba(100,60,0,.07) 0 10%, transparent 22%);
}
.stage-box.bonus-box .stage-box-label{color:#5a3d10}
.stage-box.bonus-box.empty-slot{opacity:.45}
/* Dark-mode adjustments for encarts */
:root[data-theme="dark"] .stage-box.cost{background:#1e2f42;background-image:linear-gradient(to right,rgba(120,170,210,.15) 1px,transparent 1px),linear-gradient(to bottom,rgba(120,170,210,.15) 1px,transparent 1px);background-size:6px 6px;border-color:#5a8ab0;color:#cbdef0}
:root[data-theme="dark"] .stage-box.cost .stage-box-label{color:#cbdef0}
:root[data-theme="dark"] .stage-box.bonus-box{background:linear-gradient(135deg,#4a3a18 0%,#3d2f12 55%,#2e230b 100%);border-color:#b8944b;color:#f0dfaf}
:root[data-theme="dark"] .stage-box.bonus-box .stage-box-label{color:#e8cd82}
.stage-num{width:38px;height:38px;border:2px solid var(--line);border-radius:50%;background:var(--paper);display:grid;place-items:center;font-family:'Kalam';font-weight:700;font-size:15px;color:var(--ink);cursor:pointer;transition:background var(--t-fast) var(--ease),transform var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease);outline:none}
.stage-num:hover{background:var(--paper-3)}
.stage-num:active{transform:translateY(1px)}
.stage-num:focus-visible{box-shadow:0 0 0 3px rgba(194,65,12,.35)}
.stage-num.shielded{
  background:linear-gradient(155deg,#f3d77b 0%,#dca83d 45%,#9e6e17 100%);
  color:#3a1e04;border:none;
  clip-path:polygon(0 0,100% 0,100% 55%,86% 82%,50% 100%,14% 82%,0 55%);
  border-radius:3px 3px 0 0;
  width:34px;height:42px;font-size:15px;
  align-items:center;padding:0;
  text-shadow:0 1px 0 rgba(255,255,255,.35);
  box-shadow:inset 0 0 0 2px #5e3f0f,inset 0 -4px 7px rgba(0,0,0,.2),inset 0 3px 5px rgba(255,255,255,.22);
}
.stage-num.shielded:hover{filter:brightness(1.08);background:linear-gradient(155deg,#f3d77b 0%,#dca83d 45%,#9e6e17 100%)}
.stage-cell{padding:8px 10px;min-height:38px;border:1.5px dashed transparent;border-radius:8px;cursor:pointer;display:flex;gap:4px;align-items:center;flex-wrap:wrap;transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.stage-cell:hover,.stage-cell:focus-visible{border-color:var(--line);background:var(--focus-bg);outline:none}
.stage-cell.empty{opacity:.55;font-family:'Caveat';font-size:14px;color:var(--ink-ghost);font-style:italic}

/* ── GRID MODE ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:22px;padding:20px;max-width:1400px;margin:0 auto}
.grid-item{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.grid-item .gi-name{font-family:'Kalam';font-weight:700;font-size:14px;text-align:center;color:var(--ink);cursor:pointer;padding:3px 6px;border-radius:6px;border:1.5px dashed transparent}
.grid-item .gi-name:hover{border-color:var(--line);background:var(--focus-bg)}
.grid-item .gi-meta{font-family:'Caveat';color:var(--ink-soft);font-size:13px;cursor:pointer;padding:2px 6px;border-radius:4px}
.grid-item .gi-meta:hover{background:var(--focus-bg)}
.grid-item .gi-actions{display:flex;gap:3px;margin-top:2px;opacity:.6;transition:opacity var(--t-fast) var(--ease)}
.grid-item:hover .gi-actions,.grid-item:focus-within .gi-actions{opacity:1}
.gi-actions .btn{padding:2px 6px;font-size:11px;box-shadow:none}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-overlay.anchored{background:rgba(27,26,23,.25);align-items:stretch;justify-content:stretch;padding:0;pointer-events:none}
.modal-overlay.anchored .modal{position:fixed;margin:0;max-width:min(420px,92vw);pointer-events:auto}
.modal-overlay.anchored.open{display:block}
.modal{background:var(--paper);border:2px solid var(--line);border-radius:16px;padding:20px;box-shadow:6px 6px 0 var(--line);max-width:520px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.modal textarea{width:100%;height:200px;border:2px solid var(--line);border-radius:8px;padding:8px;font-family:'Architects Daughter';font-size:12px;background:var(--paper-2);outline:none;resize:vertical;color:var(--ink)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal-close{background:none;border:none;font-family:'Kalam';font-size:22px;line-height:1;cursor:pointer;color:var(--ink-soft);padding:0 4px}
.modal-close:hover{color:var(--ink)}

.cell-field{margin:10px 0}
.cell-field label{display:block;font-family:'Kalam';font-weight:700;font-size:11px;color:var(--ink-soft);margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.cell-field input[type=text],.cell-field select,.cell-field textarea{width:100%;border:1.5px dashed var(--line);background:var(--paper);border-radius:6px;padding:6px 10px;font-family:'Patrick Hand';font-size:15px;color:var(--ink);outline:none;resize:vertical}
.cell-field input[type=text]:focus,.cell-field select:focus,.cell-field textarea:focus{border-style:solid;background:var(--focus-bg)}
.cell-field select{cursor:pointer}
.cost-editor{display:flex;flex-direction:column;gap:8px}
.cost-row{display:flex;align-items:center;gap:10px;padding:4px 0}
.cost-row .res{flex-shrink:0}
.cost-row .res-name{font-family:'Kalam';font-size:13px;flex:1;color:var(--ink-soft)}
.cost-stepper{display:flex;align-items:center;gap:6px}
.cost-stepper button{width:26px;height:26px;border:1.5px solid var(--line);border-radius:50%;background:var(--paper);cursor:pointer;font-family:'Kalam';font-weight:700;font-size:14px;display:grid;place-items:center;line-height:1;color:var(--ink)}
.cost-stepper button:hover{background:var(--paper-2)}
.cost-stepper .qty{width:28px;text-align:center;font-family:'Kalam';font-weight:700;font-size:15px;color:var(--ink)}
.img-upload{border:2px dashed var(--line);border-radius:10px;padding:24px;text-align:center;font-family:'Caveat';font-size:16px;color:var(--ink-soft);background:var(--paper);cursor:pointer;position:relative}
.img-upload:hover{background:var(--focus-bg)}
.img-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-preview{width:120px;height:120px;border-radius:50%;object-fit:cover;border:2px solid var(--line);display:block;margin:0 auto 10px}
.stage-stepper{display:flex;align-items:center;gap:10px;justify-content:center;padding:8px 0}
.stage-stepper b{font-family:'Kalam';font-size:22px;min-width:30px;text-align:center}
.stage-stepper .hint{font-family:'Caveat';color:var(--ink-ghost);font-size:14px}

.confirm-overlay{position:fixed;inset:0;background:var(--overlay);z-index:210;display:none;align-items:center;justify-content:center;padding:16px}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--paper);border:2px solid var(--line);border-radius:14px;padding:20px;box-shadow:6px 6px 0 var(--line);max-width:360px;width:100%;text-align:center}
.confirm-box h3{font-size:18px;margin-bottom:8px}
.confirm-box p{font-family:'Caveat';font-size:16px;color:var(--ink-soft);margin-bottom:14px}
.confirm-box-actions{display:flex;gap:8px;justify-content:center}

/* ── UTILS ── */
.autosave{font-family:'Caveat';font-size:14px;color:var(--accent-2);min-width:80px}
.section-label{font-family:'Kalam';font-size:12px;color:var(--ink-soft);margin:10px 0 4px;letter-spacing:.3px;text-transform:uppercase;border-bottom:1px dashed var(--line);padding-bottom:2px}
.sr-only{position:absolute !important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.flex{display:flex}.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--paper-2)}
::-webkit-scrollbar-thumb{background:var(--ink-ghost);border-radius:3px}

/* ── FOCUS RING ── */
:focus{outline:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;box-shadow:0 0 0 4px rgba(194,65,12,.18);border-radius:inherit}
.ribbon:focus-visible,.bonus:focus-visible,.kcenter:focus-visible,.corner:focus-visible{outline:3px solid var(--accent);outline-offset:2px}

/* ── TRANSITIONS ── */
.btn{transition:background var(--t-fast) var(--ease),transform var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease)}
.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--line)}
.chip{transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.vt-btn{transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.card-row{transition:box-shadow var(--t-med) var(--ease),transform var(--t-med) var(--ease)}
.card-row:hover{box-shadow:var(--shadow-md),var(--shadow-soft)}
.grid-item .kcard{transition:transform var(--t-med) var(--ease),box-shadow var(--t-med) var(--ease)}
.grid-item:hover .kcard{box-shadow:4px 4px 0 rgba(0,0,0,.14),var(--shadow-soft)}
.ribbon,.bonus,.kcenter,.corner{transition:background var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease)}

/* ── MODAL ENTER ── */
.modal-overlay,.confirm-overlay{opacity:0;transition:opacity var(--t-med) var(--ease)}
.modal-overlay.open,.confirm-overlay.open{opacity:1}
.modal,.confirm-box{transform:scale(.96);opacity:0;transition:transform var(--t-med) var(--ease),opacity var(--t-med) var(--ease)}
.modal-overlay.open .modal,.confirm-overlay.open .confirm-box{transform:scale(1);opacity:1}

/* ── THEME TOGGLE ── */
.theme-toggle{width:36px;height:36px;border:2px solid var(--line);background:var(--paper);border-radius:50%;cursor:pointer;display:grid;place-items:center;box-shadow:var(--shadow-sm);font-size:16px;transition:background var(--t-fast) var(--ease),transform var(--t-fast) var(--ease);color:var(--ink)}
.theme-toggle:hover{background:var(--paper-2)}
.theme-toggle:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--line)}

/* ── DARK-MODE CARD OVERRIDES ── */
:root[data-theme="dark"] .kcard{background:repeating-linear-gradient(90deg,#6b5233 0 3px,#5a4429 3px 8px,#6b5233 8px 14px)}
:root[data-theme="dark"] .kcard.exploration{background:repeating-linear-gradient(0deg,#3d4a2b 0 4px,#324022 4px 10px)}
:root[data-theme="dark"] .kcard.treasure{background:repeating-linear-gradient(45deg,#705522 0 5px,#5e4618 5px 12px)}
:root[data-theme="dark"] .kcard.action{background:repeating-linear-gradient(90deg,#443662 0 4px,#372952 4px 10px)}
:root[data-theme="dark"] .kcenter{background:radial-gradient(circle,#4f6624,#354514)}
:root[data-theme="dark"] .kcard.exploration .kcenter{background:radial-gradient(circle,#8a6a2b,#5e4616)}
:root[data-theme="dark"] .kcard.treasure .kcenter{background:radial-gradient(circle,#8f7320,#5a4610)}
:root[data-theme="dark"] .kcard.action .kcenter{background:radial-gradient(circle,#6e5598,#3e2c6a)}
:root[data-theme="dark"] .ribbon{background:repeating-linear-gradient(90deg,#3a342a 0 6px,#2d281f 6px 12px);border-top-color:var(--line);border-bottom-color:var(--line);color:var(--ink)}
:root[data-theme="dark"] .ribbon.editable:hover{background:repeating-linear-gradient(90deg,#4a3e26 0 6px,#3d3120 6px 12px)}
:root[data-theme="dark"] .corner.shielded,:root[data-theme="dark"] .stage-num.shielded{background:#c8a04a;border-color:#3a2a08;color:#1c0f02}
:root[data-theme="dark"] .res.wood{background:#a17b3f;color:#1c0f02}
:root[data-theme="dark"] .res.stone{background:#7d7a72;color:#0f0f0f}
:root[data-theme="dark"] .res.wheat{background:#c9ae4a;color:#2a1d02}
:root[data-theme="dark"] .res.iron{background:#bfa032;color:#1f1500}
:root[data-theme="dark"] .res.water{background:#5a8aad;color:#02141f}

/* ── RESPONSIVE ── */
@media (max-width:1250px){
  /* Force filter chip-groups onto separate rows so type-filter and res-filter stack */
  .toolbar .chip-group{flex-basis:100%;margin:0}
  .toolbar .tb-sep{display:none}
}
@media (max-width:1100px){
  .card-row{grid-template-columns:180px 180px repeat(4, minmax(90px, 1fr));gap:6px;padding:8px}
  .card-row .row-preview .kcard{--sz:170px}
  .stage-col{padding:6px 3px}
  .stage-col .stage-num{width:38px;height:38px;font-size:16px}
  .stage-col .stage-num.shielded{width:34px;height:44px;font-size:15px}
  .stage-col .stage-cell{padding:3px 4px;min-height:24px}
}
@media (max-width:900px){
  /* Preview on the left spanning 2 rows; info on top-right; 4 stage cols on bottom-right */
  .card-row{grid-template-columns:150px repeat(4, minmax(0, 1fr));grid-template-rows:auto 1fr;gap:8px}
  .card-row .row-preview{grid-column:1;grid-row:1 / span 2}
  .card-row .row-preview .kcard{--sz:140px}
  .card-row .row-info{grid-column:2 / -1;grid-row:1}
  .stage-col .stage-num{width:36px;height:36px;font-size:15px}
  .stage-col .stage-num.shielded{width:32px;height:42px;font-size:14px}
}
@media (max-width:768px){
  .chrome{padding:10px 14px}
  .brand h1{font-size:18px}
  .brand .sub{font-size:14px}
  .toolbar{padding:10px 12px;gap:8px}
  .toolbar .search{min-width:140px}
  .view-toggle{margin-left:0}
  .cards-list{padding:10px;gap:8px}
  .card-row{grid-template-columns:1fr;grid-template-rows:none;gap:8px;padding:10px}
  .card-row .row-preview,.card-row .row-info,.card-row .stage-col{grid-column:auto;grid-row:auto}
  .card-row .row-preview .kcard{--sz:min(80vw,260px)}
  .stage-col{flex-direction:row;align-items:center;gap:10px;padding:6px 10px}
  .stage-col .stage-num{flex-shrink:0}
  .stage-col .stage-cell{flex:1;min-height:28px;text-align:left;justify-content:flex-start}
  .stage-col.empty{justify-content:center;min-height:38px}
  .stage-col.empty.disabled{display:none}
  .cards-grid{padding:14px;gap:16px;grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
  .modal{padding:16px}
}
@media (max-width:480px){
  .chrome{padding:8px 10px}
  .brand-mark{transform:none;width:36px;height:36px}
  .brand h1{font-size:16px}
  .brand .sub{display:none}
  .chrome-actions .btn{padding:4px 8px;font-size:12px}
  .autosave{font-size:12px;min-width:0}
  .btn{padding:6px 10px;font-size:13px;min-height:32px}
  .chip{padding:4px 10px;font-size:12px;min-height:28px}
  .stage-col{flex-direction:column;align-items:stretch;gap:6px;padding:8px}
  .stage-col .stage-num{align-self:center}
  .stage-col .stage-cell{text-align:center;justify-content:center}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .kcard{--sz:140px}
  .kcard.sm{--sz:130px}
  .kcard.md{--sz:min(70vw,240px)}
  .kcard.lg{--sz:min(80vw,300px)}
  .modal,.confirm-box{padding:14px}
}

/* ── PRINT (PDF export) ── */
#print-area{display:none}
@media print{
  @page{size:A4;margin:1cm}
  html,body{background:#fff !important;overflow:visible !important;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
  body > *:not(#print-area){display:none !important}
  #print-area,#print-area *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
  #print-area{display:grid !important;grid-template-columns:repeat(3,1fr);gap:.4cm;padding:0}
  .print-card{page-break-inside:avoid;break-inside:avoid;display:flex;flex-direction:column;align-items:center;gap:2px}
  .print-card .kcard{--sz:6cm;box-shadow:none !important;transform:none !important}
  .print-card .print-label{font-family:'Kalam',sans-serif;font-size:9pt;color:#333;text-align:center;margin-top:2px}
}

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
}
</style>
</head>
<body>

<header class="chrome">
  <div class="chrome-top">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">KR</div>
      <div>
        <h1>Kingdom Reforged <span style="font-weight:400;opacity:.6">· Card Editor</span></h1>
        <div class="sub">Dragon's Hoard — outil d'équilibrage v0.2</div>
      </div>
    </div>
    <div class="chrome-actions">
      <span class="autosave" id="autosave-status" role="status" aria-live="polite"></span>
      <button class="theme-toggle" id="theme-toggle" aria-label="Basculer thème sombre" title="Thème sombre"><span aria-hidden="true">🌙</span></button>
      <button class="btn ghost" id="btn-import" aria-label="Importer JSON">↓ Import</button>
      <button class="btn ghost" id="btn-export" aria-label="Exporter JSON">↑ Export</button>
      <button class="btn" id="btn-pdf" aria-label="Exporter PDF (A4)">🖨 PDF</button>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="tb-group">
    <button class="btn primary" id="btn-new-card">＋ Nouvelle carte</button>
    <div class="search"><span aria-hidden="true">🔍</span><input type="text" id="search-input" placeholder="chercher…" aria-label="Rechercher une carte"/></div>
  </div>
  <div class="tb-sep" aria-hidden="true"></div>
  <div class="chip-group" id="type-filter" role="group" aria-label="Filtrer par type">
    <span class="chip on" data-type="all" tabindex="0" role="button">Toutes <span class="c" id="cnt-all">0</span></span>
    <span class="chip" data-type="building" tabindex="0" role="button">🏗️ Bâtiments <span class="c" id="cnt-building">0</span></span>
    <span class="chip" data-type="exploration" tabindex="0" role="button">🏞️ Exploration <span class="c" id="cnt-exploration">0</span></span>
    <span class="chip" data-type="treasure" tabindex="0" role="button">💰 Trésors <span class="c" id="cnt-treasure">0</span></span>
    <span class="chip" data-type="action" tabindex="0" role="button">🃏 Actions <span class="c" id="cnt-action">0</span></span>
  </div>
  <div class="tb-sep" aria-hidden="true"></div>
  <div class="chip-group" id="res-filter" role="group" aria-label="Filtrer par ressource">
    <span class="chip" data-res="wood" tabindex="0" role="button"><span class="res wood sm" aria-hidden="true">B</span> Bois</span>
    <span class="chip" data-res="stone" tabindex="0" role="button"><span class="res stone sm" aria-hidden="true">P</span> Pierre</span>
    <span class="chip" data-res="wheat" tabindex="0" role="button"><span class="res wheat sm" aria-hidden="true">Bl</span> Blé</span>
    <span class="chip" data-res="iron" tabindex="0" role="button"><span class="res iron sm" aria-hidden="true">F</span> Fer</span>
    <span class="chip" data-res="water" tabindex="0" role="button"><span class="res water sm" aria-hidden="true">E</span> Eau</span>
  </div>
  <div class="tb-sep" aria-hidden="true"></div>
  <label class="sort-ctrl" aria-label="Trier les cartes"><span class="sort-ico" aria-hidden="true">⇅</span>
    <select id="sort-select">
      <option value="custom">Ordre d'ajout</option>
      <option value="name">Nom (A→Z)</option>
      <option value="name-desc">Nom (Z→A)</option>
      <option value="type">Type</option>
    </select>
  </label>
  <div class="view-toggle" role="group" aria-label="Mode d'affichage">
    <button class="vt-btn on" data-mode="list" aria-pressed="true"><span aria-hidden="true">☰</span> Liste</button>
    <button class="vt-btn" data-mode="grid" aria-pressed="false"><span aria-hidden="true">⊞</span> Grille</button>
  </div>
</div>

<main id="cards-container" class="cards-list" aria-label="Cartes"></main>
<div id="print-area" aria-hidden="true"></div>

<!-- Cell-edit modal -->
<div class="modal-overlay" id="cell-modal" role="dialog" aria-modal="true" aria-labelledby="cell-modal-title">
  <div class="modal">
    <h3 id="cell-modal-title"><span id="cell-modal-title-text">Éditer</span><button class="modal-close" id="cell-modal-close" aria-label="Fermer">✕</button></h3>
    <div id="cell-modal-body"></div>
    <div class="modal-actions">
      <button class="btn primary" id="cell-modal-done">Fermer</button>
    </div>
  </div>
</div>

<!-- Import/Export modal -->
<div class="modal-overlay" id="io-modal" role="dialog" aria-modal="true" aria-labelledby="io-modal-title">
  <div class="modal">
    <h3 id="io-modal-title">Export JSON<button class="modal-close" id="io-close" aria-label="Fermer">✕</button></h3>
    <textarea id="io-textarea" spellcheck="false" aria-label="Contenu JSON"></textarea>
    <div class="modal-actions">
      <button class="btn primary" id="io-action">Copier</button>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="confirm-overlay" id="confirm-modal" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-msg">
  <div class="confirm-box">
    <h3 id="confirm-title">Supprimer ?</h3>
    <p id="confirm-msg">Cette action est irréversible.</p>
    <div class="confirm-box-actions">
      <button class="btn ghost" id="confirm-cancel">Annuler</button>
      <button class="btn danger" id="confirm-ok">Supprimer</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// DATA DEFINITIONS

function makeCost(w=0,s=0,wh=0,f=0,e=0){ return {wood:w,stone:s,wheat:wh,iron:f,water:e}; }
function emptyBonus(){
  return {wood:0,stone:0,wheat:0,iron:0,water:0,
          prod_wood:0,prod_stone:0,prod_wheat:0,prod_iron:0,
          pv:0,workers:0,actions:0,draw:0,explorers:0,
          chain:'',note:''};
}
function makeBonus(o={}){ return {...emptyBonus(),...o}; }
function makeStep(bonus,cost,shield=false){
  const b = (typeof bonus==='string') ? emptyBonus() : {...emptyBonus(),...bonus};
  return {bonus:b, cost:{wood:0,stone:0,wheat:0,iron:0,water:0,...cost}, shield};
}
function newId(){ return 'c'+(Date.now()+Math.random()).toString(36); }

// STATE

const state = {
  cards: [],
  stageByCard: {},
  typeFilter: 'all',
  resFilter: null,
  searchQ: '',
  sortBy: 'custom',
  viewMode: 'list',
  editing: null,
};

// ═══════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════
function save(){
  localStorage.setItem('kr-cards', JSON.stringify(state.cards));
  const el = document.getElementById('autosave-status');
  el.textContent = '✓ sauvegardé';
  clearTimeout(save._t);
  save._t = setTimeout(()=>{ el.textContent=''; }, 2000);
}
let _saveDebounceT;
function saveDebounced(delay=400){
  clearTimeout(_saveDebounceT);
  _saveDebounceT = setTimeout(save, delay);
}
function migrateBonus(b){
  if(!b || typeof b==='object') return {...emptyBonus(),...(b||{})};
  return {...emptyBonus(), note: b==='—'?'':b};
}
function load(){
  const raw = localStorage.getItem('kr-cards');
  if(raw){
    try{
      const cards = JSON.parse(raw);
      cards.forEach(c=>c.steps?.forEach(s=>{ s.bonus=migrateBonus(s.bonus); }));
      state.cards = cards;
    }catch{ state.cards = JSON.parse(JSON.stringify(DEFAULT_CARDS)); }
  } else {
    state.cards = JSON.parse(JSON.stringify(DEFAULT_CARDS));
  }
  const mode = localStorage.getItem('kr-view-mode');
  if(mode==='grid'||mode==='list') state.viewMode = mode;
}
function getCard(id){ return state.cards.find(c=>c.id===id)||null; }
function getStage(cardId){ return state.stageByCard[cardId]||0; }

// ═══════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════
function resHtml(type, qty=1, size='sm'){
  if(!qty) return '';
  const label = `${RES_NAMES[type]}${qty>1?' x'+qty:''}`;
  return Array(qty).fill(`<span class="res ${type} ${size}" role="img" aria-label="${label}"><span aria-hidden="true">${RES_LABELS[type]}</span></span>`).join('');
}
function costHtml(cost, size='sm'){
  if(!cost) return '—';
  const parts = RES_TYPES.filter(r=>cost[r]>0).map(r=>resHtml(r,cost[r],size));
  return parts.length ? parts.join('') : '—';
}
function hasCost(cost){ return cost && RES_TYPES.some(r=>cost[r]>0); }
function typeColor(type){ return TYPE_META[type]?.bg||''; }

function renderBonusHtml(b){
  if(!b) return '';
  const parts=[];
  RES_TYPES.forEach(r=>{ if(b[r]>0) parts.push(resHtml(r,b[r],'sm')); });
  ['wood','stone','wheat','iron'].forEach(r=>{
    if(b['prod_'+r]>0) parts.push(`<span class="bprod bprod-badge">${b['prod_'+r]}${resHtml(r,1,'sm')}</span>`);
  });
  if(b.pv>0) parts.push(`<span class="bpv">${b.pv}</span>`);
  if(b.workers>0) parts.push(`<span class="bworker">${b.workers>1?b.workers:''}</span>`);
  if(b.actions>0) parts.push(`<span class="baction">${b.actions>1?b.actions:''}</span>`);
  if(b.draw>0) parts.push(`<span class="bdraw">${b.draw>1?b.draw:''}</span>`);
  if(b.explorers>0) parts.push(`<span>+${b.explorers}🏔</span>`);
  if(b.chain&&CHAIN_LABELS[b.chain]) parts.push(`<span class="bchain">${CHAIN_LABELS[b.chain]}</span>`);
  if(b.note) parts.push(`<span style="font-family:'Caveat';font-size:10px;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block">${b.note}</span>`);
  return parts.join('');
}

function renderBonusDetail(b){
  if(!b) return '<span class="stage-cell empty">—</span>';
  const html = renderBonusHtml(b);
  return html || '<span class="empty">—</span>';
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderCardHtml(card, sizeClass='', interactive=false){
  const stage = getStage(card.id);
  const n = card.steps.length;
  const bg = typeColor(card.type);
  const rot = -stage * 90;

  let corners='', ribbons='', bonuses='';
  for(let i=0;i<4;i++){
    if(i>=n) continue;
    const step = card.steps[i];
    const shieldCls = step.shield ? ' shielded' : '';
    const editCls = interactive ? ' editable' : '';
    corners += `<div class="corner${shieldCls} ${STAGE_POSITIONS[i]}${editCls}" data-field="shield" data-stage="${i}"${interactive?' role="button" tabindex="0"':''} aria-label="Étape ${STAGE_NUMS[i]}${step.shield?' protégée':''}">${STAGE_NUMS[i]}</div>`;
    // Ribbon at corner i sits between stage i and stage i+1 → shows cost of next stage (what you pay to advance)
    const nextIdx = (i + 1) % n;
    const nextStep = card.steps[nextIdx];
    if(nextStep && hasCost(nextStep.cost))
      ribbons += `<div class="ribbon ${RIBBON_POSITIONS[i]}${editCls}" data-stage="${nextIdx}" data-field="cost"${interactive?' role="button" tabindex="0"':''} aria-label="Coût étape ${STAGE_NUMS[nextIdx]}">${costHtml(nextStep.cost,'sm')}</div>`;
    else if(interactive && nextStep)
      ribbons += `<div class="ribbon ${RIBBON_POSITIONS[i]} editable" data-stage="${nextIdx}" data-field="cost" role="button" tabindex="0" aria-label="Coût étape ${STAGE_NUMS[nextIdx]}" style="opacity:.45">＋</div>`;
    const bHtml = renderBonusHtml(step.bonus);
    if(bHtml)
      bonuses += `<div class="bonus ${STAGE_POSITIONS[i]}${editCls}" data-stage="${i}" data-field="bonus"${interactive?' role="button" tabindex="0"':''} aria-label="Bonus étape ${STAGE_NUMS[i]}">${bHtml}</div>`;
    else if(interactive)
      bonuses += `<div class="bonus ${STAGE_POSITIONS[i]} editable" data-stage="${i}" data-field="bonus" role="button" tabindex="0" aria-label="Bonus étape ${STAGE_NUMS[i]}" style="opacity:.45">＋</div>`;
  }

  const center = card.image
    ? `<div class="kcenter${interactive?' editable':''}" data-field="name"${interactive?' role="button" tabindex="0"':''} aria-label="Nom: ${escapeHtml(card.name)}"><img src="${card.image}" alt="${escapeHtml(card.name)}"/></div>`
    : `<div class="kcenter${interactive?' editable':''}" data-field="name"${interactive?' role="button" tabindex="0"':''} aria-label="Nom: ${escapeHtml(card.name)}">${escapeHtml(card.name)}</div>`;

  return `<div class="kcard ${sizeClass} ${bg}" data-id="${card.id}" style="transform:rotate(${rot}deg)">
    ${corners}${ribbons}${bonuses}${center}
  </div>`;
}

// ═══════════════════════════════════
// CARDS CONTAINER (list + grid)
// ═══════════════════════════════════
function filteredCards(){
  let cards = state.cards;
  if(state.typeFilter!=='all') cards = cards.filter(c=>c.type===state.typeFilter);
  if(state.resFilter) cards = cards.filter(c=>c.steps.some(s=>s.cost[state.resFilter]>0)||c.steps.some(s=>s.bonus[state.resFilter]>0));
  if(state.searchQ){
    const q = state.searchQ.toLowerCase();
    cards = cards.filter(c=>c.name.toLowerCase().includes(q));
  }
  if(state.sortBy && state.sortBy !== 'custom'){
    const coll = new Intl.Collator('fr', {sensitivity:'base', numeric:true});
    cards = cards.slice();
    if(state.sortBy === 'name') cards.sort((a,b)=>coll.compare(a.name, b.name));
    else if(state.sortBy === 'name-desc') cards.sort((a,b)=>coll.compare(b.name, a.name));
    else if(state.sortBy === 'type'){
      const order = ['building','exploration','treasure','action'];
      cards.sort((a,b)=>{
        const d = order.indexOf(a.type) - order.indexOf(b.type);
        return d !== 0 ? d : coll.compare(a.name, b.name);
      });
    }
  }
  return cards;
}

function updateCounts(){
  ['all','building','exploration','treasure','action'].forEach(t=>{
    const el=document.getElementById('cnt-'+t);
    if(el) el.textContent = t==='all' ? state.cards.length : state.cards.filter(c=>c.type===t).length;
  });
}

function renderCards(){
  updateCounts();
  const container = document.getElementById('cards-container');
  container.className = state.viewMode==='grid' ? 'cards-grid' : 'cards-list';
  const cards = filteredCards();
  if(!cards.length){
    container.innerHTML = `<div class="empty-state"><div class="icon" aria-hidden="true">🏰</div><div>Aucune carte ne correspond aux filtres.</div></div>`;
    return;
  }
  container.innerHTML = cards.map(c=> state.viewMode==='grid' ? renderCardGridItem(c) : renderCardRow(c)).join('');
}

function renderCardRow(card){
  const numSteps = card.steps.length;
  const copies = card.copies != null ? card.copies : 1;
  const typeOptions = Object.entries(TYPE_META).map(([k,v])=>`<option value="${k}"${card.type===k?' selected':''}>${v.icon} ${v.label}</option>`).join('');
  const imgZoneInner = card.image
    ? `<img src="${card.image}" class="inline-img-thumb" alt=""/><span class="inline-img-label">Remplacer</span><button type="button" class="btn-mini img-clear" data-card="${card.id}" data-action="image-clear" aria-label="Supprimer l'image">✕</button>`
    : `<span class="inline-img-ghost">Glisser / cliquer</span>`;

  const stageCols = [];
  for(let i=0;i<4;i++){
    if(i >= numSteps){
      const canAdd = (i === numSteps) && numSteps < 4;
      if(canAdd){
        stageCols.push(`<div class="stage-col empty" data-card="${card.id}" data-action="stage-add" role="button" tabindex="0" aria-label="Ajouter l'étape ${STAGE_NUMS[i]}"><span class="add-stage-ico" aria-hidden="true">+</span></div>`);
      } else {
        stageCols.push(`<div class="stage-col empty disabled" aria-hidden="true"></div>`);
      }
      continue;
    }
    const step = card.steps[i];
    const shieldCls = step.shield ? ' shielded' : '';
    // Cost under stage i = cost to build/reach stage i (stage I is usually empty — cycle IV→I)
    const costHas = hasCost(step.cost);
    const bonusHtml = renderBonusHtml(step.bonus);
    const canDelete = numSteps > 1;
    stageCols.push(`
      <div class="stage-col" data-stage="${i}">
        ${canDelete?`<button type="button" class="stage-del" data-card="${card.id}" data-action="stage-delete" data-stage="${i}" aria-label="Supprimer l'étape ${STAGE_NUMS[i]}">✕</button>`:''}
        <div class="stage-num${shieldCls}" data-card="${card.id}" data-field="shield-num" data-stage="${i}" role="button" tabindex="0" aria-pressed="${step.shield?'true':'false'}" aria-label="Étape ${STAGE_NUMS[i]} ${step.shield?'protégée — cliquer pour désactiver':'non protégée — cliquer pour activer'}">${STAGE_NUMS[i]}</div>
        <div class="stage-box cost" data-card="${card.id}" data-field="cost" data-stage="${i}" role="button" tabindex="0" aria-label="Éditer coût de l'étape ${STAGE_NUMS[i]}">
          <div class="stage-box-label">Coût${i===0?' (cycle)':''}</div>
          <div class="stage-box-content${costHas?'':' empty'}">${costHas?costHtml(step.cost,'sm'):'—'}</div>
        </div>
        <div class="stage-box bonus-box" data-card="${card.id}" data-field="bonus" data-stage="${i}" role="button" tabindex="0" aria-label="Éditer bonus étape ${STAGE_NUMS[i]}">
          <div class="stage-box-label">Bonus</div>
          <div class="stage-box-content${bonusHtml?'':' empty'}">${bonusHtml||'—'}</div>
        </div>
      </div>
    `);
  }

  return `
    <article class="card-row" data-id="${card.id}">
      <div class="row-preview">${renderCardHtml(card,'md',false)}</div>
      <div class="row-info">
        <label class="info-inline">
          <span class="label">Nom</span>
          <input type="text" class="inline-input" value="${escapeHtml(card.name)}" data-card="${card.id}" data-field="name-direct" aria-label="Nom de la carte"/>
        </label>
        <label class="info-inline">
          <span class="label">Type</span>
          <select class="inline-select" data-card="${card.id}" data-field="type-direct" aria-label="Type de carte">${typeOptions}</select>
        </label>
        <label class="info-inline">
          <span class="label">Image</span>
          <div class="inline-imgzone" data-card="${card.id}" data-field="image-drop">
            ${imgZoneInner}
            <input type="file" accept="image/*" data-card="${card.id}" data-field="image-file" aria-label="Téléverser illustration"/>
          </div>
        </label>
        <div class="info-inline">
          <span class="label">Copies</span>
          <div class="inline-stepper" role="group" aria-label="Nombre de copies">
            <button type="button" class="btn-mini" data-card="${card.id}" data-action="copies-minus" aria-label="Diminuer copies"${copies<=1?' disabled':''}>−</button>
            <b data-copies-value="${card.id}">${copies}</b>
            <button type="button" class="btn-mini" data-card="${card.id}" data-action="copies-plus" aria-label="Augmenter copies">+</button>
          </div>
        </div>
        <div class="row-actions">
          <button type="button" class="btn-row-act" data-card="${card.id}" data-action="duplicate" aria-label="Dupliquer ${escapeHtml(card.name)}">⎘ Dupliquer</button>
          <button type="button" class="btn-row-act danger" data-card="${card.id}" data-action="delete" aria-label="Supprimer ${escapeHtml(card.name)}">🗑 Supprimer</button>
        </div>
      </div>
      ${stageCols.join('')}
    </article>
  `;
}

function renderCardGridItem(card){
  const meta = TYPE_META[card.type];
  return `
    <div class="grid-item" data-id="${card.id}">
      ${renderCardHtml(card,'md',true)}
      <div class="gi-name" data-card="${card.id}" data-field="name" role="button" tabindex="0" aria-label="Éditer le nom">${escapeHtml(card.name)}</div>
      <div class="gi-meta" data-card="${card.id}" data-field="type" role="button" tabindex="0" aria-label="Éditer le type">${meta.icon} ${meta.label} · ${card.steps.length} étape${card.steps.length>1?'s':''}</div>
      <div class="gi-actions">
        <button class="btn ghost" data-card="${card.id}" data-action="steps" aria-label="Nombre d'étapes">#</button>
        <button class="btn ghost" data-card="${card.id}" data-action="image" aria-label="Illustration">🖼</button>
        <button class="btn ghost" data-card="${card.id}" data-action="duplicate" aria-label="Dupliquer">⎘</button>
        <button class="btn ghost" data-card="${card.id}" data-action="delete" style="color:var(--danger)" aria-label="Supprimer">🗑</button>
      </div>
    </div>
  `;
}

function openCellEditor(cardId, field, stage, clickEvent){
  const card = getCard(cardId); if(!card) return;
  state.editing = {cardId, field, stage, returnFocus: document.activeElement};
  const modal = document.getElementById('cell-modal');
  const panel = modal.querySelector('.modal');
  const titleEl = document.getElementById('cell-modal-title-text');
  const body = document.getElementById('cell-modal-body');
  let title='Éditer', html='';
  switch(field){
    case 'name':   title='Nom de la carte'; html=editorName(card); break;
    case 'type':   title='Type de carte'; html=editorType(card); break;
    case 'steps':  title="Nombre d'étapes"; html=editorSteps(card); break;
    case 'image':  title='Illustration'; html=editorImage(card); break;
    case 'cost':   title=`Coût — étape ${STAGE_NUMS[stage]}`; html=editorCost(card,stage); break;
    case 'bonus':  title=`Bonus — étape ${STAGE_NUMS[stage]}`; html=editorBonus(card,stage); break;
    case 'shield': title=`Bouclier — étape ${STAGE_NUMS[stage]}`; html=editorShield(card,stage); break;
  }
  titleEl.textContent = title;
  body.innerHTML = html;
  modal.classList.add('open');
  // Anchor popup at click coords when editing a cell via click
  if(clickEvent && clickEvent.clientX != null){
    modal.classList.add('anchored');
    panel.style.left = '0px';
    panel.style.top = '0px';
    panel.style.transform = '';
    requestAnimationFrame(()=>{
      const rect = panel.getBoundingClientRect();
      const vw = window.innerWidth, vh = window.innerHeight;
      let x = clickEvent.clientX + 10;
      let y = clickEvent.clientY + 10;
      if(x + rect.width + 8 > vw) x = Math.max(8, clickEvent.clientX - rect.width - 10);
      if(y + rect.height + 8 > vh) y = Math.max(8, vh - rect.height - 8);
      if(x < 8) x = 8; if(y < 8) y = 8;
      panel.style.left = x + 'px';
      panel.style.top = y + 'px';
    });
  } else {
    modal.classList.remove('anchored');
    panel.style.left=''; panel.style.top='';
  }
  setTimeout(()=>{
    const first = body.querySelector('input,select,textarea,button');
    if(first) first.focus();
  }, 50);
  bindEditorEvents(card, field, stage);
}

function closeCellModal(){
  const modal = document.getElementById('cell-modal');
  modal.classList.remove('open');
  modal.classList.remove('anchored');
  const panel = modal.querySelector('.modal');
  if(panel){ panel.style.left=''; panel.style.top=''; }
  const ret = state.editing?.returnFocus;
  state.editing = null;
  if(ret && document.contains(ret)) { try{ ret.focus(); }catch{} }
}

function bindEditorEvents(card, field, stage){
  if(field==='name'){
    document.getElementById('ed-name').oninput = e=>{ card.name=e.target.value; save(); renderCards(); };
  }
  if(field==='type'){
    document.getElementById('ed-type').onchange = e=>{ card.type=e.target.value; save(); renderCards(); };
  }
  if(field==='steps'){
    const refresh = ()=>{ document.getElementById('ed-steps-count').textContent = card.steps.length; save(); renderCards(); };
    document.getElementById('ed-steps-minus').onclick = ()=>{
      if(card.steps.length>1){ card.steps.pop(); state.stageByCard[card.id]=Math.min(getStage(card.id),card.steps.length-1); refresh(); }
    };
    document.getElementById('ed-steps-plus').onclick = ()=>{
      if(card.steps.length<4){ card.steps.push(makeStep(emptyBonus(),makeCost())); refresh(); }
    };
  }
  if(field==='image'){
    const input = document.getElementById('ed-img-input');
    if(input) input.onchange = e=>{
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = ev=>{ card.image = ev.target.result; save(); renderCards(); openCellEditor(card.id,'image'); };
      r.readAsDataURL(f);
    };
    const clear = document.getElementById('ed-img-clear');
    if(clear) clear.onclick = ()=>{ card.image=null; save(); renderCards(); openCellEditor(card.id,'image'); };
  }
  if(field==='cost'){
    const step = card.steps[stage];
    document.querySelectorAll('#cell-modal [data-cost]').forEach(btn=>btn.addEventListener('click',()=>{
      const r = btn.dataset.cost, d = +btn.dataset.delta;
      step.cost[r] = Math.max(0,Math.min(9,(step.cost[r]||0)+d));
      document.getElementById('ed-cost-'+r).textContent = step.cost[r];
      save(); renderCards();
    }));
  }
  if(field==='bonus'){
    const step = card.steps[stage];
    document.querySelectorAll('#cell-modal [data-bfield]').forEach(btn=>btn.addEventListener('click',()=>{
      const f = btn.dataset.bfield, d = +btn.dataset.bdelta;
      step.bonus[f] = Math.max(0,Math.min(9,(step.bonus[f]||0)+d));
      document.getElementById('ed-b-'+f).textContent = step.bonus[f];
      save(); renderCards();
    }));
    document.getElementById('ed-b-chain').onchange = e=>{ step.bonus.chain = e.target.value; save(); renderCards(); };
    document.getElementById('ed-b-note').oninput = e=>{ step.bonus.note = e.target.value; save(); renderCards(); };
  }
  if(field==='shield'){
    document.getElementById('ed-shield').onchange = e=>{
      card.steps[stage].shield = e.target.checked; save(); renderCards();
    };
  }
}

function addNewCard(){
  const card = {id:newId(),name:'Nouvelle carte',type:'building',image:null,copies:1,
    steps:[makeStep(emptyBonus(),makeCost()),makeStep(emptyBonus(),makeCost())]};
  state.cards.push(card);
  save(); renderCards();
}
function duplicateCard(id){
  const idx = state.cards.findIndex(c=>c.id===id);
  if(idx < 0) return;
  const card = state.cards[idx];
  const copy = JSON.parse(JSON.stringify(card));
  copy.id = newId();
  copy.name = card.name + ' (copie)';
  state.cards.splice(idx+1, 0, copy);
  save(); renderCards();
  // Focus the new row's name input for immediate rename
  requestAnimationFrame(()=>{
    const input = document.querySelector(`.card-row[data-id="${copy.id}"] .inline-input[data-field="name-direct"]`);
    if(input){ input.focus(); input.select(); }
  });
}

function confirmDelete(id){
  const card = getCard(id); if(!card) return;
  document.getElementById('confirm-msg').textContent = `Supprimer « ${card.name} » ?`;
  const modal = document.getElementById('confirm-modal');
  modal.classList.add('open');
  document.getElementById('confirm-ok').onclick = ()=>{
    state.cards = state.cards.filter(c=>c.id!==id);
    save(); renderCards();
    modal.classList.remove('open');
  };
  document.getElementById('confirm-cancel').onclick = ()=>modal.classList.remove('open');
}
function showStatus(msg){
  const el=document.getElementById('autosave-status');
  el.textContent = msg;
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(()=>{ el.textContent=''; }, 2000);
}

// ═══════════════════════════════════
function updateCopiesDisplay(card){
  const el = document.querySelector(`[data-copies-value="${card.id}"]`);
  if(el) el.textContent = card.copies != null ? card.copies : 1;
  const row = document.querySelector(`.card-row[data-id="${card.id}"]`);
  if(row){
    const minus = row.querySelector('[data-action="copies-minus"]');
    if(minus) minus.disabled = (card.copies||1) <= 1;
  }
}

function exportToPDF(){
  const cards = filteredCards();
  if(!cards.length){ showStatus('Aucune carte à exporter'); return; }
  const area = document.getElementById('print-area');
  area.innerHTML = '';
  let total = 0;
  cards.forEach(card=>{
    const copies = Math.max(1, card.copies != null ? card.copies : 1);
    for(let i=0;i<copies;i++){
      const wrap = document.createElement('div');
      wrap.className = 'print-card';
      wrap.innerHTML = renderCardHtml(card,'print',false) + `<div class="print-label">${escapeHtml(card.name)}</div>`;
      area.appendChild(wrap);
      total++;
    }
  });
  showStatus(`Impression: ${total} carte${total>1?'s':''}`);
  // Slight delay so layout settles before the print dialog snapshots the page
  setTimeout(()=>{ window.print(); }, 60);
}

function openExport(){
  const modal=document.getElementById('io-modal');
  document.getElementById('io-modal-title').firstChild.nodeValue='Export JSON';
  document.getElementById('io-textarea').value=JSON.stringify(state.cards,null,2);
  document.getElementById('io-action').textContent='Copier';
  document.getElementById('io-action').onclick=()=>{ navigator.clipboard.writeText(document.getElementById('io-textarea').value).then(()=>showStatus('Copié !')); };
  modal.classList.add('open');
}
function openImport(){
  const modal=document.getElementById('io-modal');
  document.getElementById('io-modal-title').firstChild.nodeValue='Import JSON';
  document.getElementById('io-textarea').value='';
  document.getElementById('io-action').textContent='Importer';
  document.getElementById('io-action').onclick=()=>{
    try{
      const cards=JSON.parse(document.getElementById('io-textarea').value);
      if(!Array.isArray(cards)) throw new Error('Format invalide');
      cards.forEach(c=>c.steps?.forEach(s=>{ s.bonus=migrateBonus(s.bonus); }));
      state.cards=cards;
      save(); renderCards();
      modal.classList.remove('open');
      showStatus('Importé !');
    }catch(e){ alert('JSON invalide : '+e.message); }
  };
  modal.classList.add('open');
}

// THEME
// ═══════════════════════════════════
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const btn=document.getElementById('theme-toggle');
  if(btn){
    const isDark=t==='dark';
    btn.setAttribute('aria-label',isDark?'Basculer thème clair':'Basculer thème sombre');
    btn.setAttribute('aria-pressed',isDark?'true':'false');
    btn.innerHTML=`<span aria-hidden="true">${isDark?'☀️':'🌙'}</span>`;
  }
}
function initTheme(){
  const stored=localStorage.getItem('kr-theme');
  const prefers=window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(stored||(prefers?'dark':'light'));
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  const next=cur==='dark'?'light':'dark';
  localStorage.setItem('kr-theme',next);
  applyTheme(next);
}

// ═══════════════════════════════════
// RESPONSIVE HEADER (--header-h var)
// ═══════════════════════════════════
function trackHeaderHeight(){
  const chrome=document.querySelector('.chrome');
  if(!chrome) return;
  const update=()=>{
    const h=chrome.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--header-h',(h+4)+'px');
  };
  update();
  if(window.ResizeObserver){ new ResizeObserver(update).observe(chrome); }
  else { window.addEventListener('resize',update); }
}

// ═══════════════════════════════════
// FOCUS TRAP (modals)
// ═══════════════════════════════════
function trapFocus(e){
  const open=document.querySelector('.modal-overlay.open, .confirm-overlay.open');
  if(!open||e.key!=='Tab') return;
  const focusable=open.querySelectorAll('button,input,select,textarea,[tabindex]:not([tabindex="-1"])');
  if(!focusable.length) return;
  const first=focusable[0], last=focusable[focusable.length-1];
  if(e.shiftKey&&document.activeElement===first){ e.preventDefault(); last.focus(); }
  else if(!e.shiftKey&&document.activeElement===last){ e.preventDefault(); first.focus(); }
}

function setViewMode(mode){
  state.viewMode = mode;
  localStorage.setItem('kr-view-mode', mode);
  document.querySelectorAll('.vt-btn').forEach(b=>{
    const on = b.dataset.mode===mode;
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', on?'true':'false');
  });
  renderCards();
}

// ═══════════════════════════════════
// EVENT BINDINGS
// ═══════════════════════════════════
function bindEvents(){
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  document.getElementById('btn-new-card').addEventListener('click', addNewCard);
  document.getElementById('btn-import').addEventListener('click', openImport);
  document.getElementById('btn-export').addEventListener('click', openExport);
  document.getElementById('btn-pdf').addEventListener('click', exportToPDF);
  document.getElementById('io-close').addEventListener('click', ()=>document.getElementById('io-modal').classList.remove('open'));
  document.getElementById('io-modal').addEventListener('click', e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });
  document.getElementById('confirm-modal').addEventListener('click', e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });

  // Cell modal close
  document.getElementById('cell-modal-close').addEventListener('click', closeCellModal);
  document.getElementById('cell-modal-done').addEventListener('click', closeCellModal);
  document.getElementById('cell-modal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeCellModal(); });

  // Search
  document.getElementById('search-input').addEventListener('input', e=>{ state.searchQ=e.target.value; renderCards(); });
  const sortSel = document.getElementById('sort-select');
  if(sortSel){
    sortSel.value = state.sortBy;
    sortSel.addEventListener('change', e=>{ state.sortBy = e.target.value; renderCards(); });
  }

  // Type filter
  document.getElementById('type-filter').addEventListener('click', e=>{
    const c = e.target.closest('[data-type]'); if(!c) return;
    state.typeFilter = c.dataset.type;
    document.querySelectorAll('#type-filter [data-type]').forEach(x=>x.classList.toggle('on', x.dataset.type===state.typeFilter));
    renderCards();
  });
  document.getElementById('type-filter').addEventListener('keydown', e=>{
    if(e.key!=='Enter'&&e.key!==' ') return;
    const c = e.target.closest('[data-type]'); if(!c) return;
    e.preventDefault(); c.click();
  });

  // Resource filter (toggle)
  document.getElementById('res-filter').addEventListener('click', e=>{
    const c = e.target.closest('[data-res]'); if(!c) return;
    state.resFilter = state.resFilter===c.dataset.res ? null : c.dataset.res;
    document.querySelectorAll('#res-filter [data-res]').forEach(x=>x.classList.toggle('on', x.dataset.res===state.resFilter));
    renderCards();
  });
  document.getElementById('res-filter').addEventListener('keydown', e=>{
    if(e.key!=='Enter'&&e.key!==' ') return;
    const c = e.target.closest('[data-res]'); if(!c) return;
    e.preventDefault(); c.click();
  });

  // View toggle
  document.querySelectorAll('.vt-btn').forEach(b=>b.addEventListener('click', ()=>setViewMode(b.dataset.mode)));

  // Delegated clicks on cards container
  const container = document.getElementById('cards-container');
  container.addEventListener('click', e=>{
    // Let inline inputs / selects / file inputs receive native events
    if(e.target.matches('.inline-input,.inline-select,input[type=file],input[type=text],select')) return;
    // Action buttons
    const action = e.target.closest('[data-action]');
    if(action){
      e.stopPropagation();
      const cardId = action.dataset.card;
      const card = getCard(cardId);
      const a = action.dataset.action;
      if(a==='duplicate'){ duplicateCard(cardId); return; }
      if(a==='delete'){ confirmDelete(cardId); return; }
      if(a==='steps'){ openCellEditor(cardId,'steps',undefined,e); return; }
      if(a==='image'){ openCellEditor(cardId,'image',undefined,e); return; }
      if(a==='stage-add'){
        if(card && card.steps.length<4){
          card.steps.push(makeStep(emptyBonus(),makeCost()));
          save(); renderCards();
        }
        return;
      }
      if(a==='stage-delete'){
        const st = action.dataset.stage != null ? +action.dataset.stage : -1;
        if(card && st>=0 && card.steps.length>1){
          card.steps.splice(st,1);
          state.stageByCard[cardId]=Math.min(getStage(cardId),card.steps.length-1);
          save(); renderCards();
        }
        return;
      }
      if(a==='copies-minus'){
        if(card){
          const cur = card.copies != null ? card.copies : 1;
          if(cur > 1){ card.copies = cur - 1; updateCopiesDisplay(card); saveDebounced(); }
        }
        return;
      }
      if(a==='copies-plus'){
        if(card){
          const cur = card.copies != null ? card.copies : 1;
          card.copies = Math.min(99, cur + 1); updateCopiesDisplay(card); saveDebounced();
        }
        return;
      }
      if(a==='image-clear'){
        if(card){ card.image=null; save(); renderCards(); }
        return;
      }
    }
    // Editable cell
    const cell = e.target.closest('[data-field]');
    if(!cell) return;
    const field = cell.dataset.field;
    // Inline fields handled via input/change — ignore clicks
    if(field==='name-direct'||field==='type-direct'||field==='image-file') return;
    const cardId = cell.dataset.card || cell.closest('[data-id]')?.dataset.id;
    const stage = cell.dataset.stage != null ? +cell.dataset.stage : undefined;
    if(!cardId) return;
    // Image drop zone: ignore clicks not on the file input (native label handles)
    if(field==='image-drop') return;
    // Shield toggle (grid corner + list stage-num)
    if(field==='shield'||field==='shield-num'){
      const card = getCard(cardId);
      if(card && card.steps[stage]){
        card.steps[stage].shield = !card.steps[stage].shield;
        save(); renderCards();
      }
      return;
    }
    openCellEditor(cardId, field, stage, e);
  });
  // Inline text input: live-update without re-render
  container.addEventListener('input', e=>{
    const t = e.target;
    if(t.matches('.inline-input[data-field="name-direct"]')){
      const cardId = t.dataset.card;
      const card = getCard(cardId);
      if(!card) return;
      card.name = t.value;
      saveDebounced();
      const rowK = document.querySelector(`.card-row[data-id="${cardId}"] .row-preview .kcenter`);
      if(rowK && !card.image) rowK.textContent = card.name;
      const gridK = document.querySelector(`.grid-item[data-id="${cardId}"] .kcenter`);
      if(gridK && !card.image) gridK.textContent = card.name;
      const giN = document.querySelector(`.grid-item[data-id="${cardId}"] .gi-name`);
      if(giN) giN.textContent = card.name;
    }
  });
  container.addEventListener('change', e=>{
    const t = e.target;
    if(t.matches('.inline-select[data-field="type-direct"]')){
      const card = getCard(t.dataset.card);
      if(!card) return;
      card.type = t.value;
      save(); renderCards();
      return;
    }
    if(t.matches('input[type=file][data-field="image-file"]')){
      const card = getCard(t.dataset.card);
      if(!card) return;
      const f = t.files && t.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = ev=>{ card.image = ev.target.result; save(); renderCards(); };
      r.readAsDataURL(f);
      return;
    }
  });
  // Drop handlers for image zones
  container.addEventListener('dragover', e=>{
    const zone = e.target.closest('.inline-imgzone');
    if(!zone) return;
    e.preventDefault();
    zone.classList.add('dragover');
  });
  container.addEventListener('dragleave', e=>{
    const zone = e.target.closest('.inline-imgzone');
    if(zone) zone.classList.remove('dragover');
  });
  container.addEventListener('drop', e=>{
    const zone = e.target.closest('.inline-imgzone');
    if(!zone) return;
    e.preventDefault();
    zone.classList.remove('dragover');
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if(!f || !f.type.startsWith('image/')) return;
    const card = getCard(zone.dataset.card);
    if(!card) return;
    const r = new FileReader();
    r.onload = ev=>{ card.image = ev.target.result; save(); renderCards(); };
    r.readAsDataURL(f);
  });
  container.addEventListener('keydown', e=>{
    if(e.key!=='Enter'&&e.key!==' ') return;
    const cell = e.target.closest('[data-field],[data-action]');
    if(!cell) return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
    e.preventDefault();
    e.target.click();
  });

  // Focus trap + Esc
  document.addEventListener('keydown', trapFocus);
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape'){
      const cell = document.getElementById('cell-modal');
      if(cell.classList.contains('open')){ closeCellModal(); e.preventDefault(); return; }
      const io = document.getElementById('io-modal');
      if(io.classList.contains('open')){ io.classList.remove('open'); e.preventDefault(); return; }
      const cm = document.getElementById('confirm-modal');
      if(cm.classList.contains('open')){ cm.classList.remove('open'); e.preventDefault(); return; }
    }
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='s'){ e.preventDefault(); save(); showStatus('✓ sauvegardé'); }
  });
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
initTheme();
load();
bindEvents();
trackHeaderHeight();
setViewMode(state.viewMode);
</script>
</body>
</html>
