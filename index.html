<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Kingdom Reforged — Card Editor</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Architects+Daughter&family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4efe4;--paper-2:#ece4d2;--paper-3:#e3d9c2;
  --ink:#1b1a17;--ink-soft:#4a463d;--ink-ghost:#756e5d;
  --accent:#c2410c;--accent-2:#0f766e;--accent-3:#a16207;
  --danger:#b91c1c;--line:#2a2722;--wood:#d7b27a;--wood-2:#c69a5c;
  --focus-bg:#fff8e6;
  --grain:rgba(20,20,0,.035);
  --overlay:rgba(27,26,23,.55);
  --card-center-ring:rgba(255,255,255,.9);
  --s-1:4px;--s-2:8px;--s-3:12px;--s-4:16px;--s-5:24px;--s-6:32px;
  --shadow-sm:2px 2px 0 var(--line);
  --shadow-md:4px 4px 0 rgba(0,0,0,.12);
  --shadow-lg:6px 6px 0 var(--line);
  --shadow-soft:0 2px 6px rgba(0,0,0,.08);
  --t-fast:120ms;--t-med:220ms;--t-slow:380ms;
  --ease:cubic-bezier(.4,0,.2,1);
  --header-h:100px;
}
:root[data-theme="dark"]{
  --paper:#1c1a16;--paper-2:#26231d;--paper-3:#322d25;
  --ink:#ece4d2;--ink-soft:#b8afa0;--ink-ghost:#8a8270;
  --accent:#e2753a;--accent-2:#2dd4bf;--accent-3:#d4a54a;
  --danger:#ef4444;--line:#d6ccb8;--wood:#5a4429;--wood-2:#6e5534;
  --focus-bg:#2a251d;
  --grain:rgba(255,255,255,.04);
  --overlay:rgba(0,0,0,.7);
  --shadow-md:4px 4px 0 rgba(0,0,0,.35);
  --shadow-soft:0 2px 8px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:'Patrick Hand',sans-serif;font-size:16px;line-height:1.4;min-height:100vh}
body{background-image:radial-gradient(circle at 20% 10%,var(--grain),transparent 40%),radial-gradient(circle at 80% 80%,var(--grain),transparent 40%),repeating-linear-gradient(0deg,transparent 0 27px,var(--grain) 27px 28px);overflow-x:hidden}
h1,h2,h3,h4{font-family:'Kalam',cursive;font-weight:700}

/* ── HEADER ── */
.chrome{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:2px dashed var(--line);padding:12px 20px}
.chrome-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:40px;height:40px;border:2px solid var(--line);border-radius:10px;display:grid;place-items:center;background:var(--paper-2);transform:rotate(-6deg);font-family:'Kalam';font-weight:700;font-size:20px;box-shadow:3px 3px 0 var(--line)}
.brand h1{font-size:22px}
.brand .sub{font-family:'Caveat';color:var(--ink-soft);font-size:16px}
.chrome-actions{margin-left:auto;display:flex;gap:6px;align-items:center}

/* ── BUTTONS ── */
.btn{font-family:'Kalam';font-weight:700;font-size:13px;border:2px solid var(--line);background:var(--paper);padding:5px 12px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;box-shadow:2px 2px 0 var(--line);white-space:nowrap;color:var(--ink)}
.btn:hover{background:var(--paper-2)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:#a83509}
.btn.teal{background:var(--accent-2);color:#fff;border-color:var(--accent-2)}
.btn.ghost{background:transparent;box-shadow:none;border-style:dashed}
.btn.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn.danger:hover{background:#991b1b}
.btn:disabled{opacity:.45;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;gap:4px;font-family:'Kalam';font-size:12px;font-weight:700;border:1.5px solid var(--line);padding:3px 10px;border-radius:14px;background:var(--paper);cursor:pointer;color:var(--ink)}
.chip.on{background:var(--ink);color:var(--paper)}
.chip:hover:not(.on){background:var(--paper-2)}
.chip .c{opacity:.7;font-family:'Caveat';margin-left:2px}

/* ── RESOURCE TOKENS ── */
.res{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);font-family:'Kalam';font-weight:700;font-size:10px;flex-shrink:0}
.res.wood{background:#e2c391;color:#5a3a12}.res.stone{background:#d4d1ca;color:#3a3a3a}
.res.wheat{background:#f1d983;color:#6b4a0a}.res.iron{background:#e7c547;color:#5a4108}
.res.water{background:#9ec9e6;color:#0a3856}
.res.lg{width:28px;height:28px;font-size:12px}
.res.sm{width:18px;height:18px;font-size:9px}

/* ── CARD ── */
.kcard{
  width:var(--sz,220px);height:var(--sz,220px);position:relative;
  border:3px solid var(--line);border-radius:14px;
  background:repeating-linear-gradient(90deg,var(--wood) 0 3px,var(--wood-2) 3px 8px,var(--wood) 8px 14px);
  box-shadow:4px 4px 0 rgba(0,0,0,.12);overflow:hidden;
  transition:transform .45s cubic-bezier(.65,0,.35,1);flex-shrink:0;
}
.kcard.sm{--sz:160px}.kcard.xs{--sz:110px}.kcard.md{--sz:220px}.kcard.lg{--sz:320px}.kcard.xl{--sz:400px}
.kcard.exploration{background:repeating-linear-gradient(0deg,#cfdab6 0 4px,#bccca0 4px 10px)}
.kcard.treasure{background:repeating-linear-gradient(45deg,#e6cf91 0 5px,#d9bc75 5px 12px)}
.kcard.action{background:repeating-linear-gradient(90deg,#cbbce0 0 4px,#b9a5d4 4px 10px)}
/* corner stage number */
.corner{position:absolute;width:26px;height:26px;border:2px solid var(--line);border-radius:50%;background:var(--paper);display:grid;place-items:center;font-family:'Kalam';font-weight:700;font-size:12px;z-index:3;color:var(--ink)}
.corner.top{top:5px;left:50%;transform:translateX(-50%)}
.corner.right{right:5px;top:50%;transform:translateY(-50%) rotate(90deg)}
.corner.bottom{bottom:5px;left:50%;transform:translateX(-50%) rotate(180deg)}
.corner.left{left:5px;top:50%;transform:translateY(-50%) rotate(-90deg)}
/* heraldic shield corner: stage number visible inside */
.corner.shielded{
  background:linear-gradient(155deg,#f3d77b 0%,#dca83d 45%,#9e6e17 100%);
  color:#3a1e04;
  border:none;
  clip-path:polygon(0 0,100% 0,100% 55%,86% 82%,50% 100%,14% 82%,0 55%);
  border-radius:3px 3px 0 0;
  width:26px;height:30px;font-size:12px;
  align-items:center;padding:0;
  text-shadow:0 1px 0 rgba(255,255,255,.35);
  box-shadow:inset 0 0 0 2px #5e3f0f,inset 0 -4px 6px rgba(0,0,0,.2),inset 0 3px 4px rgba(255,255,255,.22);
}
.corner.editable{cursor:pointer}
/* diagonal cost ribbon */
.ribbon{position:absolute;width:54%;height:20px;background:repeating-linear-gradient(-45deg,#f0e7d4 0 6px,#e4d7ba 6px 12px);border-top:1.5px solid var(--line);border-bottom:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;gap:2px;font-family:'Kalam';font-size:10px;font-weight:700;z-index:2;color:var(--ink)}
.ribbon.tr{top:22px;right:-18%;transform:rotate(-45deg)}
.ribbon.br{bottom:22px;right:-18%;transform:rotate(45deg)}
.ribbon.bl{bottom:22px;left:-18%;transform:rotate(-45deg)}
.ribbon.tl{top:22px;left:-18%;transform:rotate(45deg)}
.ribbon.editable{cursor:pointer}.ribbon.editable:hover{background:repeating-linear-gradient(-45deg,#fff5d6 0 6px,#f5e5ab 6px 12px)}
/* bonus slot */
.bonus{position:absolute;background:var(--paper);border:1.5px solid var(--line);border-radius:7px;padding:3px 7px;font-family:'Kalam';font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px;z-index:2;white-space:nowrap;color:var(--ink)}
.bonus.top{top:30px;left:50%;transform:translateX(-50%)}
.bonus.right{right:4px;top:50%;transform:translateY(-50%) rotate(90deg);max-width:calc(var(--sz,220px) * .4);overflow:hidden}
.bonus.bottom{bottom:30px;left:50%;transform:translateX(-50%) rotate(180deg)}
.bonus.left{left:4px;top:50%;transform:translateY(-50%) rotate(-90deg);max-width:calc(var(--sz,220px) * .4);overflow:hidden}
.bonus.editable{cursor:pointer}.bonus.editable:hover{background:var(--focus-bg)}
/* bonus icons */
.bpv{display:inline-flex;align-items:center;gap:1px;font-family:'Kalam';font-weight:700}
.bpv::before{content:'★';color:#c2410c}
.bworker::before{content:'👷';font-size:10px}
.baction::before{content:'⚡';font-size:10px}
.bdraw::before{content:'📜';font-size:10px}
.bchain{color:var(--accent-2)}
.bprod{opacity:.8}
.bprod-badge::after{content:'⟳';font-size:9px;opacity:.7}
/* bonus structured editor (reused in cell modal) */
.bonus-editor{display:flex;flex-direction:column;gap:6px}
.be-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.be-label{font-family:'Kalam';font-size:11px;color:var(--ink-soft);min-width:80px;text-transform:uppercase;letter-spacing:.3px}
.be-stepper{display:inline-flex;align-items:center;gap:4px;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:2px 6px}
.be-stepper span{font-family:'Kalam';font-weight:700;font-size:13px;min-width:16px;text-align:center;color:var(--ink)}
.be-stepper button{width:20px;height:20px;border:none;background:none;cursor:pointer;font-family:'Kalam';font-weight:700;font-size:14px;line-height:1;color:var(--ink-soft)}
.be-stepper button:hover{color:var(--ink)}
.be-select{font-family:'Kalam';font-size:12px;border:1.5px solid var(--line);border-radius:6px;background:var(--paper);padding:3px 6px;cursor:pointer;color:var(--ink)}
.be-note{font-family:'Patrick Hand';font-size:14px;border:1.5px dashed var(--line);border-radius:6px;background:var(--paper);padding:4px 8px;width:100%;outline:none;color:var(--ink)}
.be-note:focus{border-style:solid;background:var(--focus-bg)}
/* center illustration */
.kcenter{position:absolute;inset:26%;border:2.5px solid var(--line);border-radius:50%;background:radial-gradient(circle,#a8c35a,#6b8b2e);display:grid;place-items:center;color:#fff;font-family:'Kalam';font-weight:700;font-size:12px;text-align:center;z-index:2;overflow:hidden}
.kcard.exploration .kcenter{background:radial-gradient(circle,#e9c57a,#b88437)}
.kcard.treasure .kcenter{background:radial-gradient(circle,#f4d871,#b8892a)}
.kcard.action .kcenter{background:radial-gradient(circle,#c4a7e0,#7b5db0)}
.kcenter img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.kcenter.editable{cursor:pointer}.kcenter.editable:hover{box-shadow:0 0 0 3px var(--accent)}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:12px;padding:12px 20px;border-bottom:2px dashed var(--line);flex-wrap:wrap;align-items:center;background:var(--paper)}
.tb-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tb-sep{width:1.5px;align-self:stretch;background:var(--line);opacity:.35;margin:2px 4px}
.search{display:flex;align-items:center;gap:6px;border:2px solid var(--line);border-radius:20px;padding:4px 12px;background:var(--paper-2);min-width:180px;max-width:260px}
.search input{border:none;outline:none;background:transparent;flex:1;font-family:'Patrick Hand';font-size:15px;color:var(--ink);min-width:80px}
.chip-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.view-toggle{display:inline-flex;border:2px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);margin-left:auto}
.vt-btn{border:none;background:var(--paper);padding:6px 14px;cursor:pointer;font-family:'Kalam';font-weight:700;font-size:13px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:4px}
.vt-btn.on{background:var(--ink);color:var(--paper)}
.vt-btn:not(.on):hover{background:var(--paper-2)}
.template-select{border:2px solid var(--line);border-radius:8px;background:var(--paper);padding:5px 10px;font-family:'Kalam';font-size:13px;color:var(--ink);box-shadow:var(--shadow-sm);cursor:pointer}
.template-select:focus{background:var(--focus-bg)}

/* ── BALANCE PANEL ── */
.balance-panel{padding:14px 20px;border-bottom:2px dashed var(--line);background:var(--paper-2)}
.balance-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:minmax(260px,1fr) minmax(280px,1.4fr);gap:14px;align-items:start}
.balance-card{border:2px solid var(--line);border-radius:8px;background:var(--paper);padding:12px;box-shadow:var(--shadow-md)}
.balance-card h2{font-size:17px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.metric{border:1.5px dashed var(--line);border-radius:8px;padding:8px;background:var(--paper-2);min-height:58px}
.metric .k{font-family:'Kalam';font-size:10px;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.3px}
.metric .v{font-family:'Kalam';font-size:20px;font-weight:700;color:var(--ink)}
.metric .s{font-family:'Caveat';font-size:13px;color:var(--ink-ghost)}
.issue-list{display:flex;flex-direction:column;gap:6px;max-height:170px;overflow:auto;padding-right:4px}
.issue{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;border:1.5px solid var(--line);border-radius:8px;padding:6px 8px;background:var(--paper-2);font-family:'Patrick Hand';font-size:14px}
.issue.warn{border-color:var(--accent-3)}
.issue.bad{border-color:var(--danger)}
.issue .tag{font-family:'Kalam';font-size:10px;text-transform:uppercase;color:var(--ink-soft)}
.issue .jump{font-size:11px;padding:2px 7px;box-shadow:none}
.issue-empty{font-family:'Caveat';font-size:16px;color:var(--ink-soft);padding:8px}

/* ── MAIN ── */
main{min-height:50vh}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;color:var(--ink-ghost);font-family:'Caveat';font-size:18px;text-align:center}
.empty-state .icon{font-size:48px}

/* ── LIST MODE ── */
.cards-list{display:flex;flex-direction:column;gap:14px;padding:20px;max-width:1200px;margin:0 auto}
.card-row{display:grid;grid-template-columns:230px 240px 1fr;gap:18px;padding:14px;border:2px solid var(--line);border-radius:14px;background:var(--paper-2);box-shadow:var(--shadow-md);align-items:center}
.row-preview{display:grid;place-items:center;min-height:230px}
.row-info{display:flex;flex-direction:column;gap:6px}
.info-cell{padding:7px 10px;border:1.5px dashed transparent;border-radius:8px;cursor:pointer;display:flex;gap:8px;align-items:baseline;transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.info-cell:hover,.info-cell:focus-visible{border-color:var(--line);background:var(--focus-bg);outline:none}
.info-cell .label{font-family:'Kalam';font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);min-width:56px;font-weight:700}
.info-cell .value{font-family:'Patrick Hand';font-size:15px;flex:1;color:var(--ink);word-break:break-word}
.info-cell .value.placeholder{color:var(--ink-ghost);font-family:'Caveat';font-style:italic}
/* Inline editors for row-info (name/type/steps/image) */
.info-inline{display:flex;align-items:center;gap:10px;padding:4px 8px;border:1.5px dashed transparent;border-radius:8px;transition:border-color var(--t-fast) var(--ease)}
.info-inline:hover{border-color:var(--line)}
.info-inline .label{font-family:'Kalam';font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);min-width:56px;font-weight:700;flex-shrink:0}
.inline-input{flex:1;min-width:0;font-family:'Patrick Hand';font-size:15px;color:var(--ink);padding:4px 8px;background:transparent;border:1.5px dashed transparent;border-radius:6px;outline:none}
.inline-input:hover{border-color:var(--line);background:var(--paper-3)}
.inline-input:focus{border-style:solid;border-color:var(--accent);background:var(--focus-bg)}
.inline-select{border:1.5px solid var(--line);border-radius:6px;background:var(--paper);padding:4px 8px;font-family:'Patrick Hand';font-size:14px;color:var(--ink);cursor:pointer;outline:none}
.inline-select:focus{border-color:var(--accent);background:var(--focus-bg)}
.inline-stepper{display:inline-flex;align-items:center;gap:6px}
.inline-stepper b{font-family:'Kalam';font-weight:700;font-size:16px;min-width:20px;text-align:center;color:var(--ink)}
.btn-mini{width:24px;height:24px;border:1.5px solid var(--line);border-radius:50%;background:var(--paper);cursor:pointer;font-family:'Kalam';font-weight:700;font-size:13px;color:var(--ink);display:grid;place-items:center;padding:0;line-height:1;transition:background var(--t-fast) var(--ease)}
.btn-mini:hover:not(:disabled){background:var(--paper-2)}
.btn-mini:disabled{opacity:.35;cursor:not-allowed}
.inline-imgzone{flex:1;min-height:40px;border:1.5px dashed var(--line);border-radius:6px;padding:4px 8px;position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;font-family:'Caveat';color:var(--ink-ghost);font-size:13px;transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease);overflow:hidden}
.inline-imgzone:hover{background:var(--focus-bg);border-color:var(--line)}
.inline-imgzone.dragover{background:var(--focus-bg);border-color:var(--accent);border-style:solid}
.inline-imgzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.inline-img-thumb{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid var(--line);flex-shrink:0}
.inline-img-label{flex:1;color:var(--ink-soft);font-size:12px}
.inline-img-ghost{flex:1;text-align:center}
.img-clear{margin-left:auto;color:var(--danger);border-color:var(--danger);z-index:2;position:relative}
.row-actions{display:flex;gap:4px;margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}
.row-actions .btn{padding:4px 8px;font-size:12px;box-shadow:none}
.row-stages{display:grid;grid-template-columns:46px 1fr 1fr;gap:6px 10px;align-items:center}
.rs-head{font-family:'Kalam';font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);padding:0 4px;font-weight:700}
.stage-num{width:38px;height:38px;border:2px solid var(--line);border-radius:50%;background:var(--paper);display:grid;place-items:center;font-family:'Kalam';font-weight:700;font-size:15px;color:var(--ink);cursor:pointer;transition:background var(--t-fast) var(--ease),transform var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease);outline:none}
.stage-num:hover{background:var(--paper-3)}
.stage-num:active{transform:translateY(1px)}
.stage-num:focus-visible{box-shadow:0 0 0 3px rgba(194,65,12,.35)}
.stage-num.shielded{
  background:linear-gradient(155deg,#f3d77b 0%,#dca83d 45%,#9e6e17 100%);
  color:#3a1e04;border:none;
  clip-path:polygon(0 0,100% 0,100% 55%,86% 82%,50% 100%,14% 82%,0 55%);
  border-radius:3px 3px 0 0;
  width:34px;height:42px;font-size:15px;
  align-items:center;padding:0;
  text-shadow:0 1px 0 rgba(255,255,255,.35);
  box-shadow:inset 0 0 0 2px #5e3f0f,inset 0 -4px 7px rgba(0,0,0,.2),inset 0 3px 5px rgba(255,255,255,.22);
}
.stage-num.shielded:hover{filter:brightness(1.08);background:linear-gradient(155deg,#f3d77b 0%,#dca83d 45%,#9e6e17 100%)}
.stage-cell{padding:8px 10px;min-height:38px;border:1.5px dashed transparent;border-radius:8px;cursor:pointer;display:flex;gap:4px;align-items:center;flex-wrap:wrap;transition:background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.stage-cell:hover,.stage-cell:focus-visible{border-color:var(--line);background:var(--focus-bg);outline:none}
.stage-cell.empty{opacity:.55;font-family:'Caveat';font-size:14px;color:var(--ink-ghost);font-style:italic}

/* ── GRID MODE ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:22px;padding:20px;max-width:1400px;margin:0 auto}
.grid-item{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.grid-item .gi-name{font-family:'Kalam';font-weight:700;font-size:14px;text-align:center;color:var(--ink);cursor:pointer;padding:3px 6px;border-radius:6px;border:1.5px dashed transparent}
.grid-item .gi-name:hover{border-color:var(--line);background:var(--focus-bg)}
.grid-item .gi-meta{font-family:'Caveat';color:var(--ink-soft);font-size:13px;cursor:pointer;padding:2px 6px;border-radius:4px}
.grid-item .gi-meta:hover{background:var(--focus-bg)}
.grid-item .gi-actions{display:flex;gap:3px;margin-top:2px;opacity:.6;transition:opacity var(--t-fast) var(--ease)}
.grid-item:hover .gi-actions,.grid-item:focus-within .gi-actions{opacity:1}
.gi-actions .btn{padding:2px 6px;font-size:11px;box-shadow:none}

/* ── TABLE MODE ── */
.cards-table-wrap{padding:20px;max-width:1500px;margin:0 auto;overflow:auto}
.cards-table{width:100%;border-collapse:separate;border-spacing:0 8px;min-width:980px}
.cards-table th{font-family:'Kalam';font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);text-align:left;padding:0 10px}
.cards-table td{background:var(--paper-2);border-top:2px solid var(--line);border-bottom:2px solid var(--line);padding:8px 10px;vertical-align:middle;font-family:'Patrick Hand';font-size:15px}
.cards-table td:first-child{border-left:2px solid var(--line);border-radius:8px 0 0 8px}
.cards-table td:last-child{border-right:2px solid var(--line);border-radius:0 8px 8px 0}
.table-name{font-family:'Kalam';font-weight:700;cursor:pointer;border:1.5px dashed transparent;border-radius:6px;padding:3px 6px;display:inline-block}
.table-name:hover{border-color:var(--line);background:var(--focus-bg)}
.score-pill{display:inline-flex;align-items:center;justify-content:center;min-width:34px;border:1.5px solid var(--line);border-radius:8px;padding:2px 8px;font-family:'Kalam';font-weight:700;background:var(--paper)}
.score-pill.hot{background:#f5d0c2}.score-pill.cold{background:#d6e8df}
.table-actions{display:flex;gap:4px;white-space:nowrap}
.table-actions .btn{padding:3px 7px;font-size:11px;box-shadow:none}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-overlay.anchored{background:rgba(27,26,23,.25);align-items:stretch;justify-content:stretch;padding:0;pointer-events:none}
.modal-overlay.anchored .modal{position:fixed;margin:0;max-width:min(420px,92vw);pointer-events:auto}
.modal-overlay.anchored.open{display:block}
.modal{background:var(--paper);border:2px solid var(--line);border-radius:16px;padding:20px;box-shadow:6px 6px 0 var(--line);max-width:520px;width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.modal textarea{width:100%;height:200px;border:2px solid var(--line);border-radius:8px;padding:8px;font-family:'Architects Daughter';font-size:12px;background:var(--paper-2);outline:none;resize:vertical;color:var(--ink)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal-close{background:none;border:none;font-family:'Kalam';font-size:22px;line-height:1;cursor:pointer;color:var(--ink-soft);padding:0 4px}
.modal-close:hover{color:var(--ink)}

.cell-field{margin:10px 0}
.cell-field label{display:block;font-family:'Kalam';font-weight:700;font-size:11px;color:var(--ink-soft);margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.cell-field input[type=text],.cell-field select,.cell-field textarea{width:100%;border:1.5px dashed var(--line);background:var(--paper);border-radius:6px;padding:6px 10px;font-family:'Patrick Hand';font-size:15px;color:var(--ink);outline:none;resize:vertical}
.cell-field input[type=text]:focus,.cell-field select:focus,.cell-field textarea:focus{border-style:solid;background:var(--focus-bg)}
.cell-field select{cursor:pointer}
.cost-editor{display:flex;flex-direction:column;gap:8px}
.cost-row{display:flex;align-items:center;gap:10px;padding:4px 0}
.cost-row .res{flex-shrink:0}
.cost-row .res-name{font-family:'Kalam';font-size:13px;flex:1;color:var(--ink-soft)}
.cost-stepper{display:flex;align-items:center;gap:6px}
.cost-stepper button{width:26px;height:26px;border:1.5px solid var(--line);border-radius:50%;background:var(--paper);cursor:pointer;font-family:'Kalam';font-weight:700;font-size:14px;display:grid;place-items:center;line-height:1;color:var(--ink)}
.cost-stepper button:hover{background:var(--paper-2)}
.cost-stepper .qty{width:28px;text-align:center;font-family:'Kalam';font-weight:700;font-size:15px;color:var(--ink)}
.img-upload{border:2px dashed var(--line);border-radius:10px;padding:24px;text-align:center;font-family:'Caveat';font-size:16px;color:var(--ink-soft);background:var(--paper);cursor:pointer;position:relative}
.img-upload:hover{background:var(--focus-bg)}
.img-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-preview{width:120px;height:120px;border-radius:50%;object-fit:cover;border:2px solid var(--line);display:block;margin:0 auto 10px}
.stage-stepper{display:flex;align-items:center;gap:10px;justify-content:center;padding:8px 0}
.stage-stepper b{font-family:'Kalam';font-size:22px;min-width:30px;text-align:center}
.stage-stepper .hint{font-family:'Caveat';color:var(--ink-ghost);font-size:14px}

.confirm-overlay{position:fixed;inset:0;background:var(--overlay);z-index:210;display:none;align-items:center;justify-content:center;padding:16px}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--paper);border:2px solid var(--line);border-radius:14px;padding:20px;box-shadow:6px 6px 0 var(--line);max-width:360px;width:100%;text-align:center}
.confirm-box h3{font-size:18px;margin-bottom:8px}
.confirm-box p{font-family:'Caveat';font-size:16px;color:var(--ink-soft);margin-bottom:14px}
.confirm-box-actions{display:flex;gap:8px;justify-content:center}

/* ── UTILS ── */
.autosave{font-family:'Caveat';font-size:14px;color:var(--accent-2);min-width:80px}
.section-label{font-family:'Kalam';font-size:12px;color:var(--ink-soft);margin:10px 0 4px;letter-spacing:.3px;text-transform:uppercase;border-bottom:1px dashed var(--line);padding-bottom:2px}
.sr-only{position:absolute !important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.flex{display:flex}.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--paper-2)}
::-webkit-scrollbar-thumb{background:var(--ink-ghost);border-radius:3px}

/* ── FOCUS RING ── */
:focus{outline:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;box-shadow:0 0 0 4px rgba(194,65,12,.18);border-radius:inherit}
.ribbon:focus-visible,.bonus:focus-visible,.kcenter:focus-visible,.corner:focus-visible{outline:3px solid var(--accent);outline-offset:2px}

/* ── TRANSITIONS ── */
.btn{transition:background var(--t-fast) var(--ease),transform var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease)}
.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--line)}
.chip{transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.vt-btn{transition:background var(--t-fast) var(--ease),color var(--t-fast) var(--ease)}
.card-row{transition:box-shadow var(--t-med) var(--ease),transform var(--t-med) var(--ease)}
.card-row:hover{box-shadow:var(--shadow-md),var(--shadow-soft)}
.focus-pulse{box-shadow:0 0 0 4px rgba(15,118,110,.28),var(--shadow-md) !important}
.grid-item .kcard{transition:transform var(--t-med) var(--ease),box-shadow var(--t-med) var(--ease)}
.grid-item:hover .kcard{box-shadow:4px 4px 0 rgba(0,0,0,.14),var(--shadow-soft)}
.ribbon,.bonus,.kcenter,.corner{transition:background var(--t-fast) var(--ease),box-shadow var(--t-fast) var(--ease)}

/* ── MODAL ENTER ── */
.modal-overlay,.confirm-overlay{opacity:0;transition:opacity var(--t-med) var(--ease)}
.modal-overlay.open,.confirm-overlay.open{opacity:1}
.modal,.confirm-box{transform:scale(.96);opacity:0;transition:transform var(--t-med) var(--ease),opacity var(--t-med) var(--ease)}
.modal-overlay.open .modal,.confirm-overlay.open .confirm-box{transform:scale(1);opacity:1}

/* ── THEME TOGGLE ── */
.theme-toggle{width:36px;height:36px;border:2px solid var(--line);background:var(--paper);border-radius:50%;cursor:pointer;display:grid;place-items:center;box-shadow:var(--shadow-sm);font-size:16px;transition:background var(--t-fast) var(--ease),transform var(--t-fast) var(--ease);color:var(--ink)}
.theme-toggle:hover{background:var(--paper-2)}
.theme-toggle:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--line)}

/* ── DARK-MODE CARD OVERRIDES ── */
:root[data-theme="dark"] .kcard{background:repeating-linear-gradient(90deg,#6b5233 0 3px,#5a4429 3px 8px,#6b5233 8px 14px)}
:root[data-theme="dark"] .kcard.exploration{background:repeating-linear-gradient(0deg,#3d4a2b 0 4px,#324022 4px 10px)}
:root[data-theme="dark"] .kcard.treasure{background:repeating-linear-gradient(45deg,#705522 0 5px,#5e4618 5px 12px)}
:root[data-theme="dark"] .kcard.action{background:repeating-linear-gradient(90deg,#443662 0 4px,#372952 4px 10px)}
:root[data-theme="dark"] .kcenter{background:radial-gradient(circle,#4f6624,#354514)}
:root[data-theme="dark"] .kcard.exploration .kcenter{background:radial-gradient(circle,#8a6a2b,#5e4616)}
:root[data-theme="dark"] .kcard.treasure .kcenter{background:radial-gradient(circle,#8f7320,#5a4610)}
:root[data-theme="dark"] .kcard.action .kcenter{background:radial-gradient(circle,#6e5598,#3e2c6a)}
:root[data-theme="dark"] .ribbon{background:repeating-linear-gradient(-45deg,#3a342a 0 6px,#2d281f 6px 12px);border-top-color:var(--line);border-bottom-color:var(--line);color:var(--ink)}
:root[data-theme="dark"] .ribbon.editable:hover{background:repeating-linear-gradient(-45deg,#4a3e26 0 6px,#3d3120 6px 12px)}
:root[data-theme="dark"] .corner.shielded,:root[data-theme="dark"] .stage-num.shielded{background:#c8a04a;border-color:#3a2a08;color:#1c0f02}
:root[data-theme="dark"] .res.wood{background:#a17b3f;color:#1c0f02}
:root[data-theme="dark"] .res.stone{background:#7d7a72;color:#0f0f0f}
:root[data-theme="dark"] .res.wheat{background:#c9ae4a;color:#2a1d02}
:root[data-theme="dark"] .res.iron{background:#bfa032;color:#1f1500}
:root[data-theme="dark"] .res.water{background:#5a8aad;color:#02141f}

/* ── RESPONSIVE ── */
@media (max-width:1100px){
  .balance-inner{grid-template-columns:1fr}
  .metric-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .card-row{grid-template-columns:200px 1fr;grid-template-rows:auto auto}
  .row-stages{grid-column:1/-1}
  .row-preview{min-height:auto}
}
@media (max-width:768px){
  .chrome{padding:10px 14px}
  .brand h1{font-size:18px}
  .brand .sub{font-size:14px}
  .toolbar{padding:10px 12px;gap:8px}
  .toolbar .search{min-width:140px}
  .balance-panel{padding:10px 12px}
  .view-toggle{margin-left:0}
  .cards-list{padding:12px;gap:10px}
  .card-row{grid-template-columns:1fr;gap:12px;padding:12px}
  .row-preview{justify-self:center}
  .cards-grid{padding:14px;gap:16px;grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
  .modal{padding:16px}
}
@media (max-width:480px){
  .chrome{padding:8px 10px}
  .brand-mark{transform:none;width:36px;height:36px}
  .brand h1{font-size:16px}
  .brand .sub{display:none}
  .chrome-actions .btn{padding:4px 8px;font-size:12px}
  .autosave{font-size:12px;min-width:0}
  .btn{padding:6px 10px;font-size:13px;min-height:32px}
  .metric-grid{grid-template-columns:1fr}
  .chip{padding:4px 10px;font-size:12px;min-height:28px}
  .row-stages{grid-template-columns:40px 1fr;gap:4px 8px}
  .row-stages .rs-head:nth-child(3){display:none}
  .row-stages .stage-num{grid-row:span 2;align-self:start;margin-top:2px}
  .stage-cell:nth-of-type(2n){grid-column:2;grid-row:auto}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .kcard{--sz:140px}
  .kcard.sm{--sz:130px}
  .kcard.md{--sz:min(70vw,240px)}
  .kcard.lg{--sz:min(80vw,300px)}
  .modal,.confirm-box{padding:14px}
}

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
}
@media print{
  @page{size:A4;margin:10mm}
  html,body{background:#fff;color:#000}
  .chrome,.toolbar,.balance-panel,.grid-item .gi-actions,.gi-name,.gi-meta,.row-info,.row-stages,.cards-table-wrap,.empty-state{display:none !important}
  main{display:block}
  .cards-list,.cards-grid{display:grid !important;grid-template-columns:repeat(3,58mm);gap:6mm;padding:0;margin:0;max-width:none}
  .card-row,.grid-item{display:block;border:none;box-shadow:none;background:transparent;padding:0;margin:0;break-inside:avoid}
  .row-preview{display:block;min-height:0}
  .kcard{--sz:58mm !important;box-shadow:none !important;break-inside:avoid}
}
</style>
</head>
<body>

<header class="chrome">
  <div class="chrome-top">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">KR</div>
      <div>
        <h1>Kingdom Reforged <span style="font-weight:400;opacity:.6">· Card Editor</span></h1>
        <div class="sub">Dragon's Hoard — outil d'équilibrage v0.2</div>
      </div>
    </div>
    <div class="chrome-actions">
      <span class="autosave" id="autosave-status" role="status" aria-live="polite"></span>
      <button class="btn ghost" id="btn-undo" aria-label="Annuler la dernière modification" disabled>↶ Undo</button>
      <button class="btn ghost" id="btn-redo" aria-label="Rétablir la modification" disabled>↷ Redo</button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Basculer thème sombre" title="Thème sombre"><span aria-hidden="true">🌙</span></button>
      <button class="btn ghost" id="btn-import" aria-label="Importer JSON">↓ Import</button>
      <button class="btn ghost" id="btn-export" aria-label="Exporter JSON">↑ Export</button>
      <button class="btn ghost" id="btn-backup" aria-label="Télécharger une sauvegarde JSON">Backup</button>
      <button class="btn ghost" id="btn-csv" aria-label="Exporter un tableau CSV">CSV</button>
      <button class="btn teal" id="btn-print" aria-label="Imprimer les cartes">Imprimer</button>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="tb-group">
    <select class="template-select" id="template-select" aria-label="Modèle de nouvelle carte">
      <option value="building">Bâtiment</option>
      <option value="exploration">Exploration</option>
      <option value="treasure">Trésor</option>
      <option value="action">Action</option>
      <option value="blank">Vide</option>
    </select>
    <button class="btn primary" id="btn-new-card">＋ Nouvelle carte</button>
    <div class="search"><span aria-hidden="true">🔍</span><input type="text" id="search-input" placeholder="chercher…" aria-label="Rechercher une carte"/></div>
  </div>
  <div class="tb-sep" aria-hidden="true"></div>
  <div class="chip-group" id="type-filter" role="group" aria-label="Filtrer par type">
    <span class="chip on" data-type="all" tabindex="0" role="button">Toutes <span class="c" id="cnt-all">0</span></span>
    <span class="chip" data-type="building" tabindex="0" role="button">🏗️ Bâtiments <span class="c" id="cnt-building">0</span></span>
    <span class="chip" data-type="exploration" tabindex="0" role="button">🏞️ Exploration <span class="c" id="cnt-exploration">0</span></span>
    <span class="chip" data-type="treasure" tabindex="0" role="button">💰 Trésors <span class="c" id="cnt-treasure">0</span></span>
    <span class="chip" data-type="action" tabindex="0" role="button">🃏 Actions <span class="c" id="cnt-action">0</span></span>
  </div>
  <div class="tb-sep" aria-hidden="true"></div>
  <div class="chip-group" id="res-filter" role="group" aria-label="Filtrer par ressource">
    <span class="chip" data-res="wood" tabindex="0" role="button"><span class="res wood sm" aria-hidden="true">B</span> Bois</span>
    <span class="chip" data-res="stone" tabindex="0" role="button"><span class="res stone sm" aria-hidden="true">P</span> Pierre</span>
    <span class="chip" data-res="wheat" tabindex="0" role="button"><span class="res wheat sm" aria-hidden="true">Bl</span> Blé</span>
    <span class="chip" data-res="iron" tabindex="0" role="button"><span class="res iron sm" aria-hidden="true">F</span> Fer</span>
    <span class="chip" data-res="water" tabindex="0" role="button"><span class="res water sm" aria-hidden="true">E</span> Eau</span>
  </div>
  <div class="view-toggle" role="group" aria-label="Mode d'affichage">
    <button class="vt-btn on" data-mode="list" aria-pressed="true"><span aria-hidden="true">☰</span> Liste</button>
    <button class="vt-btn" data-mode="grid" aria-pressed="false"><span aria-hidden="true">⊞</span> Grille</button>
    <button class="vt-btn" data-mode="table" aria-pressed="false"><span aria-hidden="true">▦</span> Tableau</button>
  </div>
</div>

<section class="balance-panel" id="balance-panel" aria-label="Analyse d'équilibrage"></section>
<main id="cards-container" class="cards-list" aria-label="Cartes"></main>

<!-- Cell-edit modal -->
<div class="modal-overlay" id="cell-modal" role="dialog" aria-modal="true" aria-labelledby="cell-modal-title">
  <div class="modal">
    <h3 id="cell-modal-title"><span id="cell-modal-title-text">Éditer</span><button class="modal-close" id="cell-modal-close" aria-label="Fermer">✕</button></h3>
    <div id="cell-modal-body"></div>
    <div class="modal-actions">
      <button class="btn primary" id="cell-modal-done">Fermer</button>
    </div>
  </div>
</div>

<!-- Import/Export modal -->
<div class="modal-overlay" id="io-modal" role="dialog" aria-modal="true" aria-labelledby="io-modal-title">
  <div class="modal">
    <h3 id="io-modal-title">Export JSON<button class="modal-close" id="io-close" aria-label="Fermer">✕</button></h3>
    <textarea id="io-textarea" spellcheck="false" aria-label="Contenu JSON"></textarea>
    <div class="modal-actions">
      <button class="btn ghost" id="io-secondary" type="button">Télécharger</button>
      <button class="btn primary" id="io-action">Copier</button>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="confirm-overlay" id="confirm-modal" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-msg">
  <div class="confirm-box">
    <h3 id="confirm-title">Supprimer ?</h3>
    <p id="confirm-msg">Cette action est irréversible.</p>
    <div class="confirm-box-actions">
      <button class="btn ghost" id="confirm-cancel">Annuler</button>
      <button class="btn danger" id="confirm-ok">Supprimer</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// DATA DEFINITIONS
// ═══════════════════════════════════
const RES_TYPES = ['wood','stone','wheat','iron','water'];
const RES_LABELS = {wood:'B',stone:'P',wheat:'Bl',iron:'F',water:'E'};
const RES_NAMES  = {wood:'Bois',stone:'Pierre',wheat:'Blé',iron:'Fer',water:'Eau'};
const STAGE_NUMS = ['I','II','III','IV'];
const STAGE_POSITIONS = ['top','right','bottom','left'];
const RIBBON_POSITIONS = ['tr','br','bl','tl'];
const TYPE_META = {
  building:    {label:'Bâtiment',   icon:'🏗️', bg:''},
  exploration: {label:'Exploration',icon:'🏞️', bg:'exploration'},
  treasure:    {label:'Trésor',     icon:'💰', bg:'treasure'},
  action:      {label:'Action',     icon:'🃏', bg:'action'},
};
const CHAIN_LABELS = {building:'🔗🏗',harvest:'🔗👷',explore:'🔗🏞'};
const CHAIN_FULL   = {building:'🔗🏗 Bâtiment',harvest:'🔗👷 Récolte',explore:'🔗🏞 Exploration'};

function makeCost(w=0,s=0,wh=0,f=0,e=0){ return {wood:w,stone:s,wheat:wh,iron:f,water:e}; }
function emptyBonus(){
  return {wood:0,stone:0,wheat:0,iron:0,water:0,
          prod_wood:0,prod_stone:0,prod_wheat:0,prod_iron:0,
          pv:0,workers:0,actions:0,draw:0,explorers:0,
          chain:'',note:''};
}
function makeBonus(o={}){ return {...emptyBonus(),...o}; }
function makeStep(bonus,cost,shield=false){
  const b = (typeof bonus==='string') ? emptyBonus() : {...emptyBonus(),...bonus};
  return {bonus:b, cost:{wood:0,stone:0,wheat:0,iron:0,water:0,...cost}, shield};
}
function newId(){ return 'c'+(Date.now()+Math.random()).toString(36); }

// ═══════════════════════════════════
// DEFAULT CARDS
// ═══════════════════════════════════
const B = makeBonus;
const DEFAULT_CARDS = [
  {id:'hq',name:'Bâtiment Principal',type:'building',image:null,steps:[
    makeStep(B({workers:1}),          makeCost(1,1),    true),
    makeStep(B({workers:1,pv:1}),     makeCost(2,0,1),  true),
    makeStep(B({workers:2}),          makeCost(0,2,0,1),true),
    makeStep(B({pv:5}),               makeCost(),        true),
  ]},
  {id:'scierie',name:'Scierie',type:'building',image:null,steps:[
    makeStep(B(),                     makeCost(1),       false),
    makeStep(B({wood:1}),             makeCost(1,1),     true),
    makeStep(B({prod_wood:1}),        makeCost(),        true),
  ]},
  {id:'carriere',name:'Carrière',type:'building',image:null,steps:[
    makeStep(B(),                     makeCost(0,1),     false),
    makeStep(B({stone:1}),            makeCost(1,1),     false),

// STATE
// ═══════════════════════════════════
const state = {
  cards: [],
  stageByCard: {},
  typeFilter: 'all',
  resFilter: null,
  searchQ: '',
  viewMode: 'list',
  editing: null,
  undoStack: [],
  redoStack: [],
  lastSnapshot: '',
  historyLocked: false,
};

// ═══════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════
function snapshotCards(){ return JSON.stringify(state.cards); }
function updateHistoryButtons(){
  const undo=document.getElementById('btn-undo');
  const redo=document.getElementById('btn-redo');
  if(undo) undo.disabled = !state.undoStack.length;
  if(redo) redo.disabled = !state.redoStack.length;
}
function save(){
  const next = snapshotCards();
  if(!state.historyLocked && state.lastSnapshot && next!==state.lastSnapshot){
    state.undoStack.push(state.lastSnapshot);
    if(state.undoStack.length>60) state.undoStack.shift();
    state.redoStack = [];
    state.lastSnapshot = next;
  } else if(!state.lastSnapshot) {
    state.lastSnapshot = next;
  }
  localStorage.setItem('kr-cards', next);
  updateHistoryButtons();
  const el = document.getElementById('autosave-status');
  el.textContent = '✓ sauvegardé';
  clearTimeout(save._t);
  save._t = setTimeout(()=>{ el.textContent=''; }, 2000);
}
let _saveDebounceT;
function saveDebounced(delay=400){
  clearTimeout(_saveDebounceT);
  _saveDebounceT = setTimeout(save, delay);
}
function migrateBonus(b){
  if(!b || typeof b==='object') return {...emptyBonus(),...(b||{})};
  return {...emptyBonus(), note: b==='—'?'':b};
}
function normalizeCost(cost={}){
  return RES_TYPES.reduce((acc,r)=>{ acc[r]=Math.max(0,Math.min(9,Number(cost?.[r])||0)); return acc; }, {});
}
function normalizeStep(step={}){
  return {bonus:migrateBonus(step.bonus), cost:normalizeCost(step.cost), shield:!!step.shield};
}
function normalizeCard(card={}, index=0){
  const steps = Array.isArray(card.steps) && card.steps.length ? card.steps.slice(0,4).map(normalizeStep) : [makeStep(emptyBonus(),makeCost())];
  return {
    id: String(card.id||newId()+index),
    name: String(card.name||'Carte sans nom'),
    type: TYPE_META[card.type] ? card.type : 'building',
    image: card.image||null,
    steps,
  };
}
function normalizeCards(cards){
  if(!Array.isArray(cards)) throw new Error('Format invalide');
  return cards.map(normalizeCard);
}
function load(){
  const raw = localStorage.getItem('kr-cards');
  if(raw){
    try{
      state.cards = normalizeCards(JSON.parse(raw));
    }catch{ state.cards = JSON.parse(JSON.stringify(DEFAULT_CARDS)); }
  } else {
    state.cards = JSON.parse(JSON.stringify(DEFAULT_CARDS));
  }
  const mode = localStorage.getItem('kr-view-mode');
  if(mode==='grid'||mode==='list'||mode==='table') state.viewMode = mode;
  state.lastSnapshot = snapshotCards();
  updateHistoryButtons();
}
function getCard(id){ return state.cards.find(c=>c.id===id)||null; }
function getStage(cardId){ return state.stageByCard[cardId]||0; }
function restoreSnapshot(snapshot, msg){
  clearTimeout(_saveDebounceT);
  state.historyLocked = true;
  state.cards = normalizeCards(JSON.parse(snapshot));
  state.lastSnapshot = snapshotCards();
  localStorage.setItem('kr-cards', state.lastSnapshot);
  state.historyLocked = false;
  updateHistoryButtons();
  renderCards();
  showStatus(msg);
}
function undo(){
  const current = snapshotCards();
  if(current!==state.lastSnapshot){
    state.redoStack.push(current);
    restoreSnapshot(state.lastSnapshot,'Annulé');
    return;
  }
  if(!state.undoStack.length) return;
  state.redoStack.push(snapshotCards());
  const prev = state.undoStack.pop();
  restoreSnapshot(prev,'Annulé');
}
function redo(){
  if(!state.redoStack.length) return;
  state.undoStack.push(snapshotCards());
  const next = state.redoStack.pop();
  restoreSnapshot(next,'Rétabli');
}

// ═══════════════════════════════════
// BALANCE / VALIDATION HELPERS
// ═══════════════════════════════════
function addResourceTotals(target, source, prefix=''){
  RES_TYPES.forEach(r=>{ target[r] = (target[r]||0) + (Number(source?.[prefix+r])||0); });
}
function emptyResourceTotals(){ return RES_TYPES.reduce((acc,r)=>{ acc[r]=0; return acc; }, {}); }
function sumResources(o){ return RES_TYPES.reduce((sum,r)=>sum+(Number(o?.[r])||0),0); }
function resourceTotalsHtml(totals, size='sm'){
  const parts = RES_TYPES.filter(r=>(totals[r]||0)>0).map(r=>resHtml(r,totals[r],size));
  return parts.length ? parts.join('') : '—';
}
function cardStats(card){
  const cost = emptyResourceTotals();
  const gain = emptyResourceTotals();
  const prod = emptyResourceTotals();
  const stat = {cost,gain,prod,pv:0,workers:0,actions:0,draw:0,explorers:0,shields:0,chains:0,notes:0,emptySteps:0};
  card.steps.forEach(step=>{
    addResourceTotals(cost, step.cost);
    addResourceTotals(gain, step.bonus);
    addResourceTotals(prod, step.bonus, 'prod_');
    stat.pv += Number(step.bonus?.pv)||0;
    stat.workers += Number(step.bonus?.workers)||0;
    stat.actions += Number(step.bonus?.actions)||0;
    stat.draw += Number(step.bonus?.draw)||0;
    stat.explorers += Number(step.bonus?.explorers)||0;
    stat.shields += step.shield ? 1 : 0;
    stat.chains += step.bonus?.chain ? 1 : 0;
    stat.notes += step.bonus?.note ? 1 : 0;
    if(!hasCost(step.cost) && !renderBonusHtml(step.bonus) && !step.shield) stat.emptySteps++;
  });
  stat.totalCost = sumResources(cost);
  stat.totalGain = sumResources(gain);
  stat.totalProd = sumResources(prod);
  stat.value = stat.totalGain + stat.totalProd*3 + stat.pv*2 + stat.workers*2 + stat.actions*2 + stat.draw*1.5 + stat.explorers*1.5 + stat.shields + stat.chains*2;
  stat.score = Math.round((stat.value - stat.totalCost*1.15 - Math.max(0,card.steps.length-2)*.5)*10)/10;
  return stat;
}
function cardSearchText(card){
  const meta = TYPE_META[card.type]||{};
  const bits = [card.name, card.type, meta.label];
  card.steps.forEach((s,i)=>{
    bits.push(STAGE_NUMS[i], s.shield?'bouclier protege shield':'');
    RES_TYPES.forEach(r=>{
      if(s.cost?.[r]) bits.push('cout', RES_NAMES[r], r, String(s.cost[r]));
      if(s.bonus?.[r]) bits.push('bonus', RES_NAMES[r], r, String(s.bonus[r]));
      if(s.bonus?.['prod_'+r]) bits.push('production', RES_NAMES[r], r, String(s.bonus['prod_'+r]));
    });
    ['pv','workers','actions','draw','explorers','note','chain'].forEach(k=>{ if(s.bonus?.[k]) bits.push(k, String(s.bonus[k])); });
  });
  return bits.join(' ').toLowerCase();
}
function collectIssues(cards=state.cards){
  const issues = [];
  const imageIssues = [];
  const names = new Map();
  cards.forEach(card=>{
    const key = card.name.trim().toLowerCase();
    if(key) names.set(key,(names.get(key)||0)+1);
  });
  cards.forEach(card=>{
    const stats = cardStats(card);
    if(!card.name.trim()) issues.push({level:'bad',card,message:'Nom manquant',tag:'donnée'});
    if(names.get(card.name.trim().toLowerCase())>1) issues.push({level:'warn',card,message:'Nom en double',tag:'donnée'});
    if(!card.image) imageIssues.push({level:'warn',card,message:'Pas encore d’illustration',tag:'prod'});
    if(stats.emptySteps) issues.push({level:'warn',card,message:`${stats.emptySteps} étape vide`,tag:'design'});
    if(card.type==='building' && stats.totalCost===0 && stats.value>0) issues.push({level:'bad',card,message:'Bâtiment gratuit avec bonus',tag:'balance'});
    if(stats.score>=15) issues.push({level:'warn',card,message:`Score très haut (${stats.score})`,tag:'balance'});
    if(stats.score<=-5 && stats.value>0) issues.push({level:'warn',card,message:`Score très bas (${stats.score})`,tag:'balance'});
    card.steps.forEach((step,i)=>{
      if((step.bonus?.note||'').length>28) issues.push({level:'warn',card,message:`Note longue étape ${STAGE_NUMS[i]}`,tag:'lisibilité'});
    });
  });
  return issues.concat(imageIssues.slice(0,3));
}
function deckStats(cards=state.cards){
  const totals = {cards:cards.length,steps:0,cost:0,pv:0,prod:0,warnings:collectIssues(cards).length};
  cards.forEach(card=>{
    const s = cardStats(card);
    totals.steps += card.steps.length;
    totals.cost += s.totalCost;
    totals.pv += s.pv;
    totals.prod += s.totalProd;
  });
  return totals;
}
function renderBalancePanel(filtered=state.cards){
  const panel = document.getElementById('balance-panel');
  if(!panel) return;
  const all = deckStats(state.cards);
  const visible = deckStats(filtered);
  const issues = collectIssues(state.cards).slice(0,8);
  const issueHtml = issues.length ? issues.map(i=>`
    <div class="issue ${i.level}">
      <span class="tag">${escapeHtml(i.tag)}</span>
      <span><b>${escapeHtml(i.card.name)}</b> · ${escapeHtml(i.message)}</span>
      <button class="btn ghost jump" data-action="jump" data-card="${i.card.id}">voir</button>
    </div>`).join('') : `<div class="issue-empty">Aucun gros caillou dans la chaussure pour l’instant.</div>`;
  panel.innerHTML = `
    <div class="balance-inner">
      <div class="balance-card">
        <h2>Équilibrage rapide</h2>
        <div class="metric-grid">
          <div class="metric"><div class="k">Cartes</div><div class="v">${all.cards}</div><div class="s">${visible.cards} visibles</div></div>
          <div class="metric"><div class="k">Étapes</div><div class="v">${all.steps}</div><div class="s">${(all.steps/Math.max(1,all.cards)).toFixed(1)} / carte</div></div>
          <div class="metric"><div class="k">Coût total</div><div class="v">${all.cost}</div><div class="s">ressources</div></div>
          <div class="metric"><div class="k">PV + prod.</div><div class="v">${all.pv + all.prod}</div><div class="s">${all.pv} PV · ${all.prod} prod.</div></div>
        </div>
      </div>
      <div class="balance-card">
        <h2>Points à vérifier <span class="chip">${all.warnings}</span></h2>
        <div class="issue-list">${issueHtml}</div>
      </div>
    </div>`;
}

// ═══════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════
function resHtml(type, qty=1, size='sm'){
  if(!qty) return '';
  const label = `${RES_NAMES[type]}${qty>1?' x'+qty:''}`;
  return Array(qty).fill(`<span class="res ${type} ${size}" role="img" aria-label="${label}"><span aria-hidden="true">${RES_LABELS[type]}</span></span>`).join('');
}
function costHtml(cost, size='sm'){
  if(!cost) return '—';
  const parts = RES_TYPES.filter(r=>cost[r]>0).map(r=>resHtml(r,cost[r],size));
  return parts.length ? parts.join('') : '—';
}
function hasCost(cost){ return cost && RES_TYPES.some(r=>cost[r]>0); }
function typeColor(type){ return TYPE_META[type]?.bg||''; }

function renderBonusHtml(b){
  if(!b) return '';
  const parts=[];
  RES_TYPES.forEach(r=>{ if(b[r]>0) parts.push(resHtml(r,b[r],'sm')); });
  ['wood','stone','wheat','iron'].forEach(r=>{
    if(b['prod_'+r]>0) parts.push(`<span class="bprod bprod-badge">${b['prod_'+r]}${resHtml(r,1,'sm')}</span>`);
  });
  if(b.pv>0) parts.push(`<span class="bpv">${b.pv}</span>`);
  if(b.workers>0) parts.push(`<span class="bworker">${b.workers>1?b.workers:''}</span>`);
  if(b.actions>0) parts.push(`<span class="baction">${b.actions>1?b.actions:''}</span>`);
  if(b.draw>0) parts.push(`<span class="bdraw">${b.draw>1?b.draw:''}</span>`);
  if(b.explorers>0) parts.push(`<span>+${b.explorers}🏔</span>`);
  if(b.chain&&CHAIN_LABELS[b.chain]) parts.push(`<span class="bchain">${CHAIN_LABELS[b.chain]}</span>`);
  if(b.note) parts.push(`<span style="font-family:'Caveat';font-size:10px;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block">${escapeHtml(b.note)}</span>`);
  return parts.join('');
}

function renderBonusDetail(b){
  if(!b) return '<span class="stage-cell empty">—</span>';
  const html = renderBonusHtml(b);
  return html || '<span class="empty">—</span>';
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderCardHtml(card, sizeClass='', interactive=false){
  const stage = getStage(card.id);
  const n = card.steps.length;
  const bg = typeColor(card.type);
  const rot = -stage * 90;

  let corners='', ribbons='', bonuses='';
  for(let i=0;i<4;i++){
    if(i>=n) continue;
    const step = card.steps[i];
    const shieldCls = step.shield ? ' shielded' : '';
    const editCls = interactive ? ' editable' : '';
    corners += `<div class="corner${shieldCls} ${STAGE_POSITIONS[i]}${editCls}" data-field="shield" data-stage="${i}"${interactive?' role="button" tabindex="0"':''} aria-label="Étape ${STAGE_NUMS[i]}${step.shield?' protégée':''}">${STAGE_NUMS[i]}</div>`;
    if(hasCost(step.cost))
      ribbons += `<div class="ribbon ${RIBBON_POSITIONS[i]}${editCls}" data-stage="${i}" data-field="cost"${interactive?' role="button" tabindex="0"':''} aria-label="Coût étape ${STAGE_NUMS[i]}">${costHtml(step.cost,'sm')}</div>`;
    else if(interactive)
      ribbons += `<div class="ribbon ${RIBBON_POSITIONS[i]} editable" data-stage="${i}" data-field="cost" role="button" tabindex="0" aria-label="Coût étape ${STAGE_NUMS[i]}" style="opacity:.45">＋</div>`;
    const bHtml = renderBonusHtml(step.bonus);
    if(bHtml)
      bonuses += `<div class="bonus ${STAGE_POSITIONS[i]}${editCls}" data-stage="${i}" data-field="bonus"${interactive?' role="button" tabindex="0"':''} aria-label="Bonus étape ${STAGE_NUMS[i]}">${bHtml}</div>`;
    else if(interactive)
      bonuses += `<div class="bonus ${STAGE_POSITIONS[i]} editable" data-stage="${i}" data-field="bonus" role="button" tabindex="0" aria-label="Bonus étape ${STAGE_NUMS[i]}" style="opacity:.45">＋</div>`;
  }

  const center = card.image
    ? `<div class="kcenter${interactive?' editable':''}" data-field="name"${interactive?' role="button" tabindex="0"':''} aria-label="Nom: ${escapeHtml(card.name)}"><img src="${card.image}" alt="${escapeHtml(card.name)}"/></div>`
    : `<div class="kcenter${interactive?' editable':''}" data-field="name"${interactive?' role="button" tabindex="0"':''} aria-label="Nom: ${escapeHtml(card.name)}">${escapeHtml(card.name)}</div>`;

  return `<div class="kcard ${sizeClass} ${bg}" data-id="${card.id}" style="transform:rotate(${rot}deg)">
    ${corners}${ribbons}${bonuses}${center}
  </div>`;
}

// ═══════════════════════════════════
// CARDS CONTAINER (list + grid)
// ═══════════════════════════════════
function filteredCards(){
  let cards = state.cards;
  if(state.typeFilter!=='all') cards = cards.filter(c=>c.type===state.typeFilter);
  if(state.resFilter) cards = cards.filter(c=>c.steps.some(s=>s.cost[state.resFilter]>0)||c.steps.some(s=>s.bonus[state.resFilter]>0));
  if(state.searchQ){
    const terms = state.searchQ.toLowerCase().split(/\s+/).filter(Boolean);
    cards = cards.filter(c=>{
      const hay = cardSearchText(c);
      return terms.every(t=>hay.includes(t));
    });
  }
  return cards;
}

function updateCounts(){
  ['all','building','exploration','treasure','action'].forEach(t=>{
    const el=document.getElementById('cnt-'+t);
    if(el) el.textContent = t==='all' ? state.cards.length : state.cards.filter(c=>c.type===t).length;
  });
}

function renderCards(){
  updateCounts();
  const container = document.getElementById('cards-container');
  const cards = filteredCards();
  renderBalancePanel(cards);
  container.className = state.viewMode==='grid' ? 'cards-grid' : state.viewMode==='table' ? 'cards-table-host' : 'cards-list';
  if(!cards.length){
    container.innerHTML = `<div class="empty-state"><div class="icon" aria-hidden="true">🏰</div><div>Aucune carte ne correspond aux filtres.</div></div>`;
    return;
  }
  container.innerHTML = state.viewMode==='table'
    ? renderCardTable(cards)
    : cards.map(c=> state.viewMode==='grid' ? renderCardGridItem(c) : renderCardRow(c)).join('');
}

function renderCardRow(card){
  const meta = TYPE_META[card.type];
  const numSteps = card.steps.length;
  const stageRows = card.steps.map((step,i)=>{
    const shieldCls = step.shield ? ' shielded' : '';
    const costHas = hasCost(step.cost);
    const bonusHas = renderBonusHtml(step.bonus);
    return `

function openCellEditor(cardId, field, stage, clickEvent){
  const card = getCard(cardId); if(!card) return;
  state.editing = {cardId, field, stage, returnFocus: document.activeElement};
  const modal = document.getElementById('cell-modal');
  const panel = modal.querySelector('.modal');
  const titleEl = document.getElementById('cell-modal-title-text');
  const body = document.getElementById('cell-modal-body');
  let title='Éditer', html='';
  switch(field){
    case 'name':   title='Nom de la carte'; html=editorName(card); break;
    case 'type':   title='Type de carte'; html=editorType(card); break;
    case 'steps':  title="Nombre d'étapes"; html=editorSteps(card); break;
    case 'image':  title='Illustration'; html=editorImage(card); break;
    case 'cost':   title=`Coût — étape ${STAGE_NUMS[stage]}`; html=editorCost(card,stage); break;
    case 'bonus':  title=`Bonus — étape ${STAGE_NUMS[stage]}`; html=editorBonus(card,stage); break;
    case 'shield': title=`Bouclier — étape ${STAGE_NUMS[stage]}`; html=editorShield(card,stage); break;
  }
  titleEl.textContent = title;
  body.innerHTML = html;
  modal.classList.add('open');
  // Anchor popup at click coords when editing a cell via click
  if(clickEvent && clickEvent.clientX != null){
    modal.classList.add('anchored');
    panel.style.left = '0px';
    panel.style.top = '0px';
    panel.style.transform = '';
    requestAnimationFrame(()=>{
      const rect = panel.getBoundingClientRect();
      const vw = window.innerWidth, vh = window.innerHeight;
      let x = clickEvent.clientX + 10;
      let y = clickEvent.clientY + 10;
      if(x + rect.width + 8 > vw) x = Math.max(8, clickEvent.clientX - rect.width - 10);
      if(y + rect.height + 8 > vh) y = Math.max(8, vh - rect.height - 8);
      if(x < 8) x = 8; if(y < 8) y = 8;
      panel.style.left = x + 'px';
      panel.style.top = y + 'px';
    });
  } else {
    modal.classList.remove('anchored');
    panel.style.left=''; panel.style.top='';
  }
  setTimeout(()=>{
    const first = body.querySelector('input,select,textarea,button');
    if(first) first.focus();
  }, 50);
  bindEditorEvents(card, field, stage);
}

function closeCellModal(){
  const modal = document.getElementById('cell-modal');
  modal.classList.remove('open');
  modal.classList.remove('anchored');
  const panel = modal.querySelector('.modal');
  if(panel){ panel.style.left=''; panel.style.top=''; }
  const ret = state.editing?.returnFocus;
  state.editing = null;
  if(ret && document.contains(ret)) { try{ ret.focus(); }catch{} }
}

function bindEditorEvents(card, field, stage){
  if(field==='name'){
    document.getElementById('ed-name').oninput = e=>{ card.name=e.target.value; save(); renderCards(); };
  }
  if(field==='type'){
    document.getElementById('ed-type').onchange = e=>{ card.type=e.target.value; save(); renderCards(); };
  }
  if(field==='steps'){
    const refresh = ()=>{ document.getElementById('ed-steps-count').textContent = card.steps.length; save(); renderCards(); };
    document.getElementById('ed-steps-minus').onclick = ()=>{
      if(card.steps.length>1){ card.steps.pop(); state.stageByCard[card.id]=Math.min(getStage(card.id),card.steps.length-1); refresh(); }
    };
    document.getElementById('ed-steps-plus').onclick = ()=>{
      if(card.steps.length<4){ card.steps.push(makeStep(emptyBonus(),makeCost())); refresh(); }
    };
  }
  if(field==='image'){
    const input = document.getElementById('ed-img-input');
    if(input) input.onchange = e=>{
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = ev=>{ card.image = ev.target.result; save(); renderCards(); openCellEditor(card.id,'image'); };
      r.readAsDataURL(f);
    };
    const clear = document.getElementById('ed-img-clear');
    if(clear) clear.onclick = ()=>{ card.image=null; save(); renderCards(); openCellEditor(card.id,'image'); };
  }
  if(field==='cost'){
    const step = card.steps[stage];
    document.querySelectorAll('#cell-modal [data-cost]').forEach(btn=>btn.addEventListener('click',()=>{
      const r = btn.dataset.cost, d = +btn.dataset.delta;
      step.cost[r] = Math.max(0,Math.min(9,(step.cost[r]||0)+d));
      document.getElementById('ed-cost-'+r).textContent = step.cost[r];
      save(); renderCards();
    }));
  }
  if(field==='bonus'){
    const step = card.steps[stage];
    document.querySelectorAll('#cell-modal [data-bfield]').forEach(btn=>btn.addEventListener('click',()=>{
      const f = btn.dataset.bfield, d = +btn.dataset.bdelta;
      step.bonus[f] = Math.max(0,Math.min(9,(step.bonus[f]||0)+d));
      document.getElementById('ed-b-'+f).textContent = step.bonus[f];
      save(); renderCards();
    }));
    document.getElementById('ed-b-chain').onchange = e=>{ step.bonus.chain = e.target.value; save(); renderCards(); };
    document.getElementById('ed-b-note').oninput = e=>{ step.bonus.note = e.target.value; save(); renderCards(); };
  }
  if(field==='shield'){
    document.getElementById('ed-shield').onchange = e=>{
      card.steps[stage].shield = e.target.checked; save(); renderCards();
    };
  }
}
